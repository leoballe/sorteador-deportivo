<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sorteador</title>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- Utilidades PDF en la pestaña de resultado -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" defer></script>
  <style>
    :root{--bg:#0f172a;--panel:#111827;--card:#1f2937;--muted:#94a3b8;--text:#e5e7eb;--accent:#22c55e;--accent2:#38bdf8;--danger:#ef4444;--warn:#f59e0b}
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif}
    a{color:var(--accent2)}
    .container{
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
}

    /* Header app */
    header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:16px}
    h1{
    font-size: clamp(22px,3vw,30px);
    margin: 0;
    color: #94E5F2;
}
    .badge{
    font-size: 12px;
    background-color: #94E5F2;
    opacity: .9;
    padding: 4px 8px;
    border-radius: 999px;
    color: #000000;
    font-weight: bold;
}
    .userBox{display:flex;align-items:center;gap:8px}
    .pill{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    border: 1px solid #1B315E;
    border-radius: 999px;
    background: #0b1220;
    color: #FFFFFF;
}
    .btn{background:#0b1220;color:var(--text);border:1px solid #223046;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600}
    .btn:hover{border-color:#3b82f6}
    .btn.primary{
    border: 0;
    color: #052e16;
    background-color: #94E5F2;
}
    .btn.ghost{background:transparent;border-color:#2b3b55}
    .btn.warn{
    border: 0;
    color: #FFFFFF;
    background-color: #8A0002;
}
    .tiny{
    font-size: 13px;
    color: #94E5F2;
    font-weight: bold;
}
    .hidden{display:none}

    /* Paneles y tarjetas */
    .panel{background:var(--panel);border:1px solid #1f2937;border-radius:16px;padding:16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media (max-width:900px){.row{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid #243042;border-radius:14px;padding:14px}
    .card h3{
    margin: 0 0 8px 0;
    font-size: 16px;
    color: #94E5F2;
}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type=text],input[type=number],input[type=email],input[type=password],textarea,select{
      width:100%;background:#0b1220;color:var(--text);border:1px solid #223046;border-radius:10px;padding:10px;font-size:14px
    }
    textarea{min-height:200px;resize:vertical}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}

    /* Tabs */
    .tabs{display:flex;gap:8px;margin-bottom:12px}
    .tab{padding:8px 12px;border-radius:10px;border:1px solid #223046;background:#0b1220;cursor:pointer;color:#e5e7eb}
    .tab.active{
    background-color: #1B315E;
    border-color: #1B315E;
    color: #94E5F2;
    font-weight: bold;
}

    /* Resultado */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    .zone{background:#0b1220;border:1px solid #223046;border-radius:14px;padding:10px}
    .zone h4{margin:4px 0 8px 0}
    .zone ol{margin:0;padding-left:18px}
    .muted{color:var(--muted)}
    .warnText{color:var(--warn)}
    .errorText{color:var(--danger)}

    /* Listas con checks */
    .history{display:grid;gap:8px}
    .history .item{background:#0b1220;border:1px dashed #2b3b55;padding:8px;border-radius:10px;font-size:13px}
    .cloudFilters{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      margin:10px 0 12px 0;
      padding:10px;
      border:1px dashed #2b3b55;
      border-radius:12px;
      background:#0b1220;
    }
    .cloudFilters .filterWide{grid-column:span 2}
    .cloudFilters .filterAction{display:flex;align-items:flex-end}
    .cloudFilters .filterAction .btn{width:100%}
    @media (max-width:900px){.cloudFilters .filterWide{grid-column:span 1}}
    .listWrap{display:grid;grid-template-columns:1fr 1fr; gap:12px}
    @media (max-width:900px){.listWrap{grid-template-columns:1fr}}
    .listBox{background:#0b1220;border:1px dashed #2b3b55;border-radius:12px;padding:10px;min-height:120px}
    .listBox h4{margin:2px 0 8px 0;font-size:14px}
    .itemRow{display:flex;align-items:center;gap:8px;padding:4px 6px;border-bottom:1px dashed #1f2a3b}
    .itemRow:last-child{border-bottom:none}
    .tag{font-size:11px;color:#cbd5e1;border:1px solid #334155;border-radius:999px;padding:1px 6px}
   
    
    /* Variables para tema claro */

}

	  [data-theme="light"] .tag {
  background: #e2e8f0;

}
  

    /* Encabezado personalizado para PDF */
    .pdfHeaderPreviewBox{
      margin: 0 0 12px 0;
      padding: 10px;
      border: 1px dashed #334155;
      border-radius: 12px;
      background: #0b1220;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pdfHeaderPreviewImg{
      width: min(360px, 100%);
      max-height: 60px;
      object-fit: contain;
      background: #ffffff;
      border: 1px solid #223046;
      border-radius: 8px;
      padding: 4px;
    }
    .pdfHeaderPreviewInfo{flex:1;min-width:180px}
    [data-theme="light"] .pdfHeaderPreviewBox{
      background:#ffffff;
      border-color:#cbd5e1;
    }
    [data-theme="light"] .pdfHeaderPreviewImg{
      border-color:#cbd5e1;
    }


    /* ====================== Controles uniformes ====================== */
    :root{
      --ui-control-height: 38px;
      --ui-control-padding-x: 14px;
      --ui-control-radius: 12px;
    }

    .btn,
    button.btn,
    label.btn,
    a.btn{
      min-height: var(--ui-control-height);
      height: var(--ui-control-height);
      padding-top: 0;
      padding-bottom: 0;
      padding-left: var(--ui-control-padding-x);
      padding-right: var(--ui-control-padding-x);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1;
      white-space: nowrap;
      vertical-align: middle;
      border-radius: var(--ui-control-radius);
    }

    .btn.tiny,
    button.btn.tiny,
    label.btn.tiny,
    a.btn.tiny{
      min-height: var(--ui-control-height);
      height: var(--ui-control-height);
      padding-top: 0;
      padding-bottom: 0;
      padding-left: 12px;
      padding-right: 12px;
      font-size: 13px;
      line-height: 1;
    }

    .pill{
      min-height: var(--ui-control-height);
      height: var(--ui-control-height);
      padding-top: 0;
      padding-bottom: 0;
      padding-left: 12px;
      padding-right: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1;
      white-space: nowrap;
      vertical-align: middle;
      border-radius: 999px;
    }

    .pill input[type="checkbox"],
    .pill input[type="radio"]{
      width: 16px;
      height: 16px;
      margin: 0;
      flex: 0 0 auto;
    }

    input[type=text],
    input[type=number],
    input[type=email],
    input[type=password],
    select{
      min-height: var(--ui-control-height);
      height: var(--ui-control-height);
      padding-top: 0;
      padding-bottom: 0;
      display: flex;
      align-items: center;
    }

    .controls{
      align-items: center;
    }

    .controls > label.btn,
    .controls > .btn,
    .filterAction .btn{
      margin-bottom: 0;
    }

    .authTab{
      min-height: var(--ui-control-height);
      display: flex !important;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }


    /* ====================== Restyling general de interfaz pública v4.4 ====================== */
    :root{
      --bg:#eef4f8;
      --panel:#ffffff;
      --card:#ffffff;
      --muted:#5f6f85;
      --text:#102033;
      --accent:#94E5F2;
      --accent2:#1B315E;
      --danger:#b42318;
      --warn:#b7791f;
      --surface:#ffffff;
      --surface-soft:#f7fbfd;
      --line:#dbe6ee;
      --line-strong:#c3d2df;
      --shadow-sm:0 8px 22px rgba(27,49,94,.07);
      --shadow-md:0 18px 45px rgba(27,49,94,.12);
      --radius-lg:24px;
      --radius-md:18px;
      --ui-control-height:42px;
      --ui-control-radius:14px;
    }

    html{
      background:#eef4f8;
      scroll-behavior:smooth;
    }

    body{
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(148,229,242,.38), transparent 34%),
        radial-gradient(circle at 82% 10%, rgba(27,49,94,.14), transparent 30%),
        linear-gradient(180deg,#f7fbfd 0%,#eef4f8 46%,#e8f0f6 100%);
      color:var(--text);
      letter-spacing:.01em;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:linear-gradient(rgba(27,49,94,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(27,49,94,.025) 1px, transparent 1px);
      background-size:36px 36px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.18));
    }

    .container{
      max-width:1280px;
      padding:24px clamp(18px,3vw,34px) 34px;
      position:relative;
      z-index:1;
    }

    #appSection > .authBrand{
      margin:0 !important;
      padding:18px 0 0;
    }

    #appSection > .authBrand .logo{
      height:86px !important;
      padding-top:0 !important;
      filter:drop-shadow(0 10px 18px rgba(27,49,94,.13));
    }

    header{
      background:linear-gradient(135deg,#ffffff 0%,#f7fbfd 52%,#eefaff 100%);
      border:1px solid rgba(27,49,94,.12);
      border-radius:28px;
      padding:18px 20px;
      box-shadow:var(--shadow-md);
      align-items:center;
      margin-bottom:22px;
      position:relative;
      overflow:hidden;
    }

    header::after{
      content:'';
      position:absolute;
      right:-70px;
      top:-95px;
      width:240px;
      height:240px;
      background:radial-gradient(circle, rgba(148,229,242,.65), transparent 64%);
      pointer-events:none;
    }

    header h1{
      color:#13294b;
      font-size:clamp(28px,3.2vw,42px);
      font-weight:850;
      letter-spacing:-.035em;
      line-height:1;
    }

    header .tiny{
      color:#4d6178;
      font-size:14px;
      margin-top:8px;
      font-weight:750;
      text-transform:uppercase;
      letter-spacing:.09em;
    }

    .userBox{
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .badge{
      height:var(--ui-control-height);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 14px;
      border-radius:999px;
      background:#0063fc;
      color:#ffffff;
      opacity:1;
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 10px 22px rgba(27,49,94,.16);
      letter-spacing:.02em;
    }

    .panel{
      background:rgba(255,255,255,.82);
      border:1px solid rgba(27,49,94,.11);
      border-radius:30px;
      padding:18px;
      box-shadow:var(--shadow-md);
      backdrop-filter:blur(10px);
    }

    .row{
      grid-template-columns:minmax(0,1.04fr) minmax(390px,.96fr);
      gap:18px;
    }

    @media (max-width:980px){
      .row{grid-template-columns:1fr}
      header{align-items:flex-start;flex-direction:column}
      .userBox{justify-content:flex-start}
    }

    .card{
      background:var(--card);
      border:1px solid rgba(27,49,94,.10);
      border-radius:var(--radius-lg);
      padding:18px;
      box-shadow:var(--shadow-sm);
      position:relative;
    }

    .card + .card{
      margin-top:14px;
    }

    .card h3{
      display:flex;
      align-items:center;
      gap:10px;
      color:#13294b;
      font-size:18px;
      font-weight:850;
      letter-spacing:-.015em;
      margin:0 0 14px;
    }

    .card h3::before{
      content:'';
      width:10px;
      height:28px;
      border-radius:999px;
      background:linear-gradient(180deg,#94E5F2,#1B315E);
      box-shadow:0 5px 14px rgba(148,229,242,.55);
      flex:0 0 auto;
    }

    label{
      color:#5e7085;
      font-size:13px;
      font-weight:750;
      letter-spacing:.015em;
    }

    textarea,
    input[type=text],
    input[type=number],
    input[type=email],
    input[type=password],
    select{
      background:#f8fbfd;
      color:#102033;
      border:1px solid #d5e1ea;
      border-radius:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    textarea{
      min-height:238px;
      line-height:1.45;
      padding:14px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;
      font-size:14px;
    }

    input:focus,
    textarea:focus,
    select:focus{
      outline:none;
      border-color:#73d6e8;
      background:#ffffff;
      box-shadow:0 0 0 4px rgba(148,229,242,.32);
    }

    .controls{
      gap:10px;
      margin-top:8px;
    }

    .btn,
    button.btn,
    label.btn,
    a.btn{
      border-radius:14px;
      border:1px solid #d0dde8;
      background:#ffffff;
      color:#13294b;
      font-weight:800;
      box-shadow:0 7px 16px rgba(27,49,94,.07);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }

    .btn:hover,
    button.btn:hover,
    label.btn:hover,
    a.btn:hover{
      transform:translateY(-1px);
      border-color:#94E5F2;
      box-shadow:0 12px 24px rgba(27,49,94,.12);
    }

    .btn:active{
      transform:translateY(0);
      box-shadow:0 5px 12px rgba(27,49,94,.08);
    }

    .btn.primary{
      color:#082532;
      border:1px solid rgba(27,49,94,.08);
      background:linear-gradient(135deg,#94E5F2 0%,#7ce0f3 100%);
      box-shadow:0 12px 24px rgba(45,171,196,.20);
    }

    .btn.ghost{
      background:#f6fafc;
      border-color:#d7e3eb;
      color:#1B315E;
    }

    .btn.warn{
      background:linear-gradient(135deg,#9c1d1f,#7d1113);
      border-color:#7d1113;
      color:#ffffff;
      box-shadow:0 12px 24px rgba(138,0,2,.16);
    }

    .pill{
      background:#f5f9fc;
      border:1px solid #d5e1ea;
      color:#183354;
      font-weight:800;
      box-shadow:0 5px 12px rgba(27,49,94,.05);
    }

    .pill input[type='checkbox'],
    .pill input[type='radio']{
      accent-color:#1B315E;
    }

    .tiny{
      color:#1B315E;
      font-weight:800;
    }

    .muted{
      color:#697b90;
    }

    .tag{
      background:#eaf6fa;
      color:#173050;
      border:1px solid #cbe2eb;
      font-weight:800;
      padding:3px 8px;
    }

    .grid{
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
    }

    .zone{
      background:linear-gradient(180deg,#ffffff 0%,#f8fbfd 100%);
      border:1px solid #d6e4ec;
      border-radius:18px;
      padding:14px;
      box-shadow:0 8px 18px rgba(27,49,94,.07);
    }

    .zone h4{
      color:#13294b;
      font-size:16px;
      font-weight:850;
      border-bottom:2px solid #94E5F2;
      padding-bottom:8px;
      margin:0 0 10px;
    }

    .zone li{
      margin:6px 0;
      line-height:1.35;
    }

    .listBox,
    .history .item,
    .cloudFilters,
    .pdfHeaderPreviewBox{
      background:#f8fbfd;
      border:1px solid #d8e5ee;
      border-radius:18px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
    }

    .listBox h4{
      color:#13294b;
      font-weight:850;
      font-size:15px;
      margin-bottom:10px;
    }

    .itemRow{
      border-bottom:1px solid #e2edf3;
      padding:7px 4px;
    }

    .history{
      gap:10px;
    }

    .history .item{
      padding:12px;
      line-height:1.45;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .history .item:hover{
      transform:translateY(-1px);
      border-color:#b5dce7;
      box-shadow:0 10px 22px rgba(27,49,94,.08);
    }

    .cloudFilters{
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:12px;
      padding:14px;
    }

    .cloudFilters label{
      margin-bottom:7px;
    }

    .cloudFilters .filterWide{
      grid-column:span 2;
    }

    @media (max-width:760px){
      .cloudFilters .filterWide{grid-column:span 1}
    }

    .pdfHeaderPreviewImg{
      background:#ffffff;
      border:1px solid #d3e1ea;
      box-shadow:0 6px 16px rgba(27,49,94,.08);
    }

    #status,
    #csvInfo,
    #capInfo,
    #cloudFilterStatus,
    #discCSVInfo,
    #catCSVInfo,
    #modCSVInfo{
      min-height:18px;
    }

    #cloudFilterStatus:not(:empty),
    #status:not(:empty),
    #csvInfo:not(:empty),
    #capInfo:not(:empty){
      display:inline-flex;
      align-items:center;
      background:#eaf8fb;

/* ====================== Utils ====================== */
function toast(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#111827;border:1px solid #334155;padding:10px 12px;border-radius:10px;z-index:9999;';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function escapeHtml(text) {
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return String(text || '').replace(/[&<>"']/g, m => map[m]);
}

function getEventName() {
  const el = document.getElementById('eventNameInput');
  return el ? el.value.trim() : '';
}


/* ====================== Encabezado personalizado para PDF ====================== */
const PDF_HEADER_STORAGE_KEY = 'sorteador_pdf_header_image_v1';
let currentPdfHeaderImage = null;
const GENERATED_PDF_HEADER_WIDTH = 1800;
const GENERATED_PDF_HEADER_HEIGHT = 150;
const GENERATED_PDF_HEADER_DPI = 160;

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function splitHeaderTextBalanced(text) {
  const clean = String(text || '').trim().replace(/\s+/g, ' ');
  const words = clean.split(' ').filter(Boolean);
  if (words.length <= 2) return [clean];
  let best = [clean];
  let bestScore = Infinity;
  for (let i = 1; i < words.length; i++) {
    const line1 = words.slice(0, i).join(' ');
    const line2 = words.slice(i).join(' ');
    const score = Math.abs(line1.length - line2.length);
    if (score < bestScore) {
      bestScore = score;
      best = [line1, line2];
    }
  }
  return best;
}

function fitGeneratedHeaderText(ctx, text, maxWidth, maxHeight) {
  const oneLine = [String(text || '').trim().replace(/\s+/g, ' ')];
  const twoLines = splitHeaderTextBalanced(text);
  const candidates = [oneLine];
  if (twoLines.length > 1) candidates.push(twoLines);

  for (const lines of candidates) {
    for (let size = 84; size >= 28; size -= 2) {
      ctx.font = `800 ${size}px Inter, Segoe UI, Arial, sans-serif`;
      const widths = lines.map(line => ctx.measureText(line).width);
      const widest = Math.max(...widths, 0);
      const lineHeight = Math.round(size * 1.05);
      const blockHeight = lineHeight * lines.length;
      if (widest <= maxWidth && blockHeight <= maxHeight) {
        return { lines, size, lineHeight };
      }
    }
  }
  return { lines: twoLines.length > 1 ? twoLines : oneLine, size: 28, lineHeight: 30 };
}

function buildGeneratedPdfHeaderDataUrl(eventName) {
  const canvas = document.createElement('canvas');
  canvas.width = GENERATED_PDF_HEADER_WIDTH;
  canvas.height = GENERATED_PDF_HEADER_HEIGHT;
  const ctx = canvas.getContext('2d');
  if (!ctx) throw new Error('No se pudo crear el lienzo');

  const hueA = randomInt(0, 360);
  const hueB = (hueA + randomInt(35, 120)) % 360;
  const hueC = (hueB + randomInt(35, 120)) % 360;

  const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  gradient.addColorStop(0, `hsl(${hueA} 78% 58%)`);
  gradient.addColorStop(0.5, `hsl(${hueB} 72% 50%)`);
  gradient.addColorStop(1, `hsl(${hueC} 78% 44%)`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 9; i++) {
    const x = randomInt(-120, canvas.width + 120);
    const y = randomInt(-30, canvas.height + 30);
    const r = randomInt(70, 220);
    const alpha = 0.08 + Math.random() * 0.16;
    ctx.beginPath();
    ctx.fillStyle = `hsla(${randomInt(0,360)} 90% 95% / ${alpha.toFixed(3)})`;
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = 4;
  ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);

  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.78);
  ctx.bezierCurveTo(canvas.width * 0.22, canvas.height * 0.55, canvas.width * 0.42, canvas.height * 0.98, canvas.width * 0.68, canvas.height * 0.74);
  ctx.bezierCurveTo(canvas.width * 0.84, canvas.height * 0.58, canvas.width * 0.95, canvas.height * 0.88, canvas.width, canvas.height * 0.66);
  ctx.lineTo(canvas.width, canvas.height);
  ctx.lineTo(0, canvas.height);
  ctx.closePath();
  ctx.fill();

  const paddingX = 72;
  const paddingY = 24;
  const textLayout = fitGeneratedHeaderText(ctx, eventName, canvas.width - paddingX * 2, canvas.height - paddingY * 2);
  const totalTextHeight = textLayout.lineHeight * textLayout.lines.length;
  let y = (canvas.height - totalTextHeight) / 2 + textLayout.size * 0.82;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.font = `800 ${textLayout.size}px Inter, Segoe UI, Arial, sans-serif`;
  ctx.shadowColor = 'rgba(0,0,0,0.28)';
  ctx.shadowBlur = 16;
  ctx.shadowOffsetY = 5;
  ctx.fillStyle = '#ffffff';

  textLayout.lines.forEach((line, idx) => {

}

function parsePngDpi(bytes) {
  const sig = [137,80,78,71,13,10,26,10];
  if (!bytes || bytes.length < 33) return null;
  for (let i = 0; i < sig.length; i++) if (bytes[i] !== sig[i]) return null;
  let pos = 8;
  while (pos + 12 <= bytes.length) {
    const len = (bytes[pos] << 24) | (bytes[pos+1] << 16) | (bytes[pos+2] << 8) | bytes[pos+3];
    const type = String.fromCharCode(bytes[pos+4], bytes[pos+5], bytes[pos+6], bytes[pos+7]);
    if (type === 'pHYs' && len >= 9 && pos + 17 <= bytes.length) {
      const xppm = (bytes[pos+8] << 24) | (bytes[pos+9] << 16) | (bytes[pos+10] << 8) | bytes[pos+11];
      const yppm = (bytes[pos+12] << 24) | (bytes[pos+13] << 16) | (bytes[pos+14] << 8) | bytes[pos+15];
      const unit = bytes[pos+16];
      if (unit === 1 && xppm > 0 && yppm > 0) return Math.max(xppm, yppm) * 0.0254;
      return null;
    }
    pos += 12 + len;
  }
  return null;
}

function parseJpegDpi(bytes) {
  if (!bytes || bytes.length < 20 || bytes[0] !== 0xFF || bytes[1] !== 0xD8) return null;
  let pos = 2;
  while (pos + 9 < bytes.length) {
    if (bytes[pos] !== 0xFF) break;
    const marker = bytes[pos + 1];
    const len = (bytes[pos + 2] << 8) | bytes[pos + 3];
    if (len < 2 || pos + 2 + len > bytes.length) break;
    if (marker === 0xE0) {
      const id = String.fromCharCode(bytes[pos+4], bytes[pos+5], bytes[pos+6], bytes[pos+7], bytes[pos+8]);
      if (id === 'JFIF\0') {
        const unit = bytes[pos + 11];
        const xden = (bytes[pos + 12] << 8) | bytes[pos + 13];
        const yden = (bytes[pos + 14] << 8) | bytes[pos + 15];
        if (xden > 0 && yden > 0) {
          if (unit === 1) return Math.max(xden, yden);
          if (unit === 2) return Math.max(xden, yden) * 2.54;
        }
      }
    }
    pos += 2 + len;
  }
  return null;
}

function parseImageDpiFromBuffer(file, buffer) {
  const bytes = new Uint8Array(buffer || []);
  if ((file.type || '').toLowerCase().includes('png')) return parsePngDpi(bytes);
  if ((file.type || '').toLowerCase().includes('jpeg') || /\.jpe?g$/i.test(file.name || '')) return parseJpegDpi(bytes);
  return null;
}

  if (!validType) {
    toast('El encabezado debe ser JPG o PNG');

    return;
  }

  let buffer;

    buffer = await file.arrayBuffer();
  } catch (err) {
    toast('No se pudo leer el archivo');
    input.value = '';
    return;
  }

  const objectUrl = URL.createObjectURL(file);
  let dims;
  try {
    dims = await ltc1q0gq5ghan358l8y6unf2yz7s42efgnqcut0pvu6(objectUrl);
  } catch (err) {
    URL.revokeObjectURL(objectUrl);
    toast('No se pudo validar la imagen');
    input.value = '';
    return;
  }
  URL.revokeObjectURL(objectUrl);

  if (dims.width > 1800 || dims.height > 150) {
    toast('El encabezado no puede superar 1800 px de ancho por 150 px de alto');
    input.value = '';
    return;
  }

  const dpi = parseImageDpiFromBuffer(file, buffer);

    toast('El encabezado no puede superar 160 dpi');
    input.value = '';
    return;
  }

  let dataUrl;

    toast('No se pudo cargar la imagen');
    input.value = '';
    return;
  }

  if (dataUrl.length > 800000) {
    toast('La imagen es muy pesada para guardarla en la nube. Probá con un JPG más liviano.');
    input.value = '';
    return;
  }

  currentPdfHeaderImage = {
    dataUrl,
    name: file.name || 'encabezado',
    type: type || (dataUrl.indexOf('image/jpeg') >= 0 ? 'image/jpeg' : 'image/png'),
    width: dims.width,

function safeFilePart(value) {
  if (!value) return '';
  let s = String(value);
  try {
    s = s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  } catch (e) {}
  s = s.trim().replace(/\s+/g, '_');
  s = s.replace(/[^a-zA-Z0-9._-]/g, '');
  s = s.replace(/_+/g, '_').replace(/^_+|_+$/g, '');
  return s;
}

}

function buildExportFilename(ext, meta) {

/* ====================== CSV genérico ====================== */
function parseCSVLine(line, delimiter) {
  const result = [];
  let current = '';
  let inQuotes = false;
  
  for (let i = 0; i < line.length; i++) {
    const ch = line[i], next = line[i + 1];
    if (ch === '"') {
      if (inQuotes && next === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === delimiter && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text) {
  if (!text.trim()) return {headers: [], rows: [], delimiter: ','};
  const firstLine = text.split(/\r?\n/)[0] || '';
  const counts = {
    ',': (firstLine.match(/,/g) || []).length,
    ';': (firstLine.match(/;/g) || []).length,
    '\t': (firstLine.match(/\t/g) || []).length
  };
  const best = Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0] || ',';
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = parseCSVLine(lines[0], best);
  const rows = lines.slice(1).map(l => parseCSVLine(l, best));
  return {headers, rows, delimiter: best};
}


function parseHeadMarker(rawName, rawThird, rawLine) {
  let name = String(rawName || '').trim();
  const third = String(rawThird || '').trim();
  const fullLine = String(rawLine || '').trim();
  let head = false;
  let seedZone = null;

  function readMarker(value) {
    const v = String(value || '').trim();
    const fixed = v.match(/^(\d+)\*$/);
    if (fixed) {
      return { head: true, seedZone: parseInt(fixed[1], 10), fixed: true };
    }
    if (/^(si|sí|true|1|\*|x|cs|head|seed)$/i.test(v)) {
      return { head: true, seedZone: null, fixed: false };
    }
    return { head: false, seedZone: null, fixed: false };
  }

  function applyMarker(marker) {
    if (!marker || !marker.head) return;
    head = true;
    if (Number.isInteger(marker.seedZone) && marker.seedZone > 0) {
      seedZone = marker.seedZone;
    }
  }

  // Permite: "Equipo 1*" o "Equipo*" en la primera columna.
  const nameFixed = name.match(/^(.*?)[\s\-]*(\d+)\*\s*$/);
  if (nameFixed) {
    name = nameFixed[1].trim();
    head = true;
    seedZone = parseInt(nameFixed[2], 10);
  } else {
    const namePlainHead = name.match(/^(.*?)\s*\*+\s*$/);
    if (namePlainHead) {
      name = namePlainHead[1].trim();
      head = true;
    }
  }

  // Permite: "Equipo, Provincia, 1*" o "Equipo, Provincia, *".
  applyMarker(readMarker(third));

  // Permite: "Equipo, 1*" o "Equipo; 1*" sin tomar 1 como provincia.
  // Este era el caso que faltaba: BUE, 1* debe ir fijo a Zona 1.
  const delim = fullLine.includes(';') ? ';' : (fullLine.includes(',') ? ',' : null);
  if (delim) {
    const parts = fullLine.split(delim).map(p => String(p || '').trim());
    if (parts.length === 2) {
      applyMarker(readMarker(parts[1]));
    }
  }

  // Compatibilidad con el uso anterior: cualquier línea terminada en * es cabeza.
  if (!head && /\*\s*$/.test(fullLine)) {
    head = true;
  }

  return { name, head, seedZone };
}

function importTeamsCSV(text) {
  if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const {headers, rows, delimiter} = parseCSV(text);
  let nameIdx = -1, provinceIdx = -1, headIdx = -1;
  
  if (headers.length) {
    headers.forEach((h, i) => {
      const s = h.toLowerCase();
      if (nameIdx === -1 && (s.includes('equipo') || s.includes('team') || s.includes('nombre') || s.includes('club'))) nameIdx = i;
      if (provinceIdx === -1 && (s.includes('provincia') || s.includes('province') || s.includes('región') || s.includes('region') || s.includes('localidad'))) provinceIdx = i;
      if (headIdx === -1 && (s.includes('cabeza') || s.includes('head') || s.includes('seed') || s.includes('semilla'))) headIdx = i;
    });
  }
  
  if (nameIdx === -1) {
    nameIdx = 0;
    provinceIdx = headers.length > 1 ? 1 : -1;
    headIdx = headers.length > 2 ? 2 : -1;
  }
  
  const teams = [];
  const uniq = new Set();
  
  for (const row of rows) {
    if (row.length <= nameIdx) continue;
    const raw = (row[nameIdx] || '');
    const hv = (headIdx !== -1 && row[headIdx]) ? String(row[headIdx]).trim() : '';
    const parsedHead = parseHeadMarker(raw, hv, row.join(delimiter));
    const name = parsedHead.name;
    if (!name) continue;
    
    const key = name.toLowerCase();
    if (uniq.has(key)) continue;
    uniq.add(key);
    
    const province = (provinceIdx !== -1 && row[provinceIdx]) ? row[provinceIdx].replace(/\s*(?:\d+)?\*+\s*$/, '').trim() : '';
    teams.push({name, province, head: parsedHead.head, seedZone: parsedHead.seedZone});
  }
  
  return {teams, delimiter, hasHeaders: headers.length > 0};
}

function importDisciplinesCSV(text) {
  if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const {headers, rows, delimiter} = parseCSV(text);
  let nameIdx = 0, seedIdx = 1;
  
  if (headers.length) {
    headers.forEach((h, i) => {
      const s = h.toLowerCase();
      if (s.includes('disciplina') || s.includes('deporte') || s.includes('nombre')) nameIdx = i;
      if (s.includes('semilla') || s.includes('seed') || s.includes('código') || s.includes('codigo')) seedIdx = i;
    });
  }
  
  const items = [];
  for (const row of rows) {
    const name = (row[nameIdx] || '').trim();
    if (!name) continue;
    const seed = (row[seedIdx] || name).trim();
    items.push({name, seed});
  }
  return {items, delimiter, hasHeaders: headers.length > 0};
}

/* ====================== Cargar lista de provincias por defecto ====================== */
async function loadDefaultProvinces() {
  try {
    const response = await fetch("24provincias.csv", { cache: "no-store" });
    if (!response.ok) throw new Error("No se pudo cargar el archivo 24provincias.csv");
    let text = await response.text();
    if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // BOM

    // Si ya hay algo escrito, NO pisamos (mantiene carga manual)
    const textarea = document.getElementById("teamsInput");
    if (!textarea) return;
    if (textarea.value.trim()) return;

    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    if (!lines.length) return;

    // Detectar delimitador por la primera línea
    const first = lines[0];
    const delim = first.includes(";") ? ";" : (first.includes(",") ? "," : null);

    // Extraer primera columna si es CSV; si no, usar la línea completa
    const firstCell = delim ? (first.split(delim)[0] || "").trim() : first.trim();
    const firstLow = firstCell.toLowerCase();

    // Si la primera fila parece encabezado, la salteamos
    const looksHeader = (
      firstLow.includes("provincia") ||
      firstLow.includes("province") ||
      firstLow.includes("equipo") ||
      firstLow.includes("team") ||
      firstLow.includes("nombre") ||
      firstLow.includes("name")
    );

    const startIndex = looksHeader ? 1 : 0;

    const provinces = [];
    const seen = new Set();

    for (let i = startIndex; i < lines.length; i++) {
      const line = lines[i];
      const cell = delim ? (line.split(delim)[0] || "").trim() : line.trim();
      if (!cell) continue;
      const key = cell.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      provinces.push(cell);
    }

    textarea.value = provinces.join("\n");
    toast(`Cargadas ${provinces.length} provincias desde 24provincias.csv`);
  } catch (err) {
    console.warn("No se pudo cargar provincias:", err);
  }
}

function getActiveTeamsLive() {
  // Leer SIEMPRE lo que hay actualmente en el textarea.
  // Importante: esta versión usa parseHeadMarker para respetar cabezas fijas tipo "1*", "2*", etc.
  const lines = document.getElementById('teamsInput').value
    .split(/\r?\n/)
    .filter(l => l.trim());

  const uniq = new Set();
  const textTeams = [];
  const mapByName = new Map();

  for (const line of lines) {
    const rawLine = line.trim();

    // Soportar separador ';' o ',' (prioridad ';' si existe)
    const delim = rawLine.includes(';') ? ';' : ',';
    const parts = rawLine.split(delim).map(p => p.trim());

    const rawName = parts[0] || '';
    const rawThird = (parts[2] != null) ? String(parts[2]).trim() : '';
    const parsedHead = parseHeadMarker(rawName, rawThird, rawLine);
    const name = parsedHead.name;
    if (!name) continue;

    const key = name.toLowerCase();
    if (uniq.has(key)) continue;
    uniq.add(key);

    // Si hay solo dos columnas y la segunda es "1*", "2*" o "*", NO es provincia: es marcador de cabeza.
    // Si hay tres columnas, la segunda sí puede ser provincia y la tercera puede ser el marcador.
    let province = '';
    if (parts.length >= 3) {
      province = (parts[1] || '').replace(/\s*(?:\d+)?\*+\s*$/, '').trim();
    } else if (parts.length === 2) {
      const second = String(parts[1] || '').trim();
      const secondIsMarker = /^(\d+\*|\*|si|sí|true|1|x|cs|head|seed)$/i.test(second);
      province = secondIsMarker ? '' : second.replace(/\s*(?:\d+)?\*+\s*$/, '').trim();
    }

    const team = {
      name,
      province,
      head: parsedHead.head,
      seedZone: parsedHead.seedZone
    };
    textTeams.push(team);
    mapByName.set(key, team);
  }

  const checkListsVisible = !document
    .getElementById('checkLists')
    .classList
    .contains('hidden');

  // Si NO estás usando la vista de Activos/Descartados, usamos lo que hay escrito en el textarea.
  if (!checkListsVisible) {
    return textTeams;
  }

  // Si la vista está visible, respetamos activos/inactivos, pero actualizamos head y seedZone según el textarea.
  const updatedActive = activeTeams.map(t => {
    const key = t.name.toLowerCase();
    const fromText = mapByName.get(key);
    if (fromText) {
      return {
        name: t.name,
        province: fromText.province || t.province || '',
        head: fromText.head,
        seedZone: fromText.seedZone
      };
    }
    return t;
  });

  return updatedActive;
}




/* ====================== RNG + Sorteo ====================== */
function xmur3(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = h << 13 | h >>> 19;
  }
  return function() {
    h = Math.imul(h ^ h >>> 16, 2246822507);
    h = Math.imul(h ^ h >>> 13, 3266489909);
    return (h ^ h >>> 16) >>> 0;
  };
}

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function rngFromSeed(seed) {
  if (!seed || seed.trim() === "") return Math.random;
  const h = xmur3(String(seed))();
  return mulberry32(h);
}

function shuffle(array, rand) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function capacities(n, z) {
  const base = Math.floor(n / z), rest = n % z;
  return Array.from({length: z}, (_, i) => base + (i < rest ? 1 : 0));
}
	function capacitiesWithTeamsPerZone(n, z, teamsPerZone) {
  const totalCapacity = z * teamsPerZone;
  
  // Si hay más equipos que la capacidad total, usar distribución normal
  if (n > totalCapacity) {
    return capacities(n, z);
  }
  
  // Calcular cuántos equipos faltan para llenar todas las zonas
  const teamsToRemove = totalCapacity - n;
  
  // Si al quitar los equipos sobrantes alguna zona queda con 2 equipos,
  // reducimos la cantidad de zonas y recalculamos
  let caps = Array(z).fill(teamsPerZone);
  let currentZone = z - 1;
  let remainingToRemove = teamsToRemove;
  
  // Primero verificamos si la distribución dejaría alguna zona con 2 equipos
  for (let i = 0; i < teamsToRemove; i++) {
    if (caps[currentZone] <= 3) {
      // Si esta zona quedaría con 2 equipos al quitar uno más, reducimos zonas
      const newZoneCount = Math.max(1, Math.ceil(n / teamsPerZone));
      return capacitiesWithTeamsPerZone(n, newZoneCount, teamsPerZone);
    }
    caps[currentZone]--;
    currentZone--;
    if (currentZone < 0) currentZone = z - 1;
  }
  
  // Si llegamos aquí, la distribución es válida (ninguna zona con 2 equipos)
  return caps;
}
function capacitiesFourBySix(n) {
  const caps = [6, 6, 6, 6];
  const total = 24;
  if (n >= total) return caps;
  let deficits = total - n;
  const order = [3, 1, 2, 0]; // Zona4, Zona2, Zona3, Zona1
  let i = 0;
  while (deficits > 0) {
    const idx = order[i % order.length];
    if (caps[idx] > 0) {
      caps[idx]--;
      deficits--;
    }
    i++;
  }
  return caps;
}
  function capacitiesEightByThree(n) {
  const caps = Array(8).fill(3);
  const total = 24;
  if (n >= total) return caps;
  const d = total - n;
  const zeros = Math.floor(d / 3);
  const twos = d % 3;
  const order = [7, 6, 5, 4, 3, 2, 1, 0];
  for (let i = 0; i < zeros; i++) caps[order[i]] = 0;
  let k = zeros;
  for (let j = 0; j < twos && k < order.length; j++, k++) {
    if (caps[order[k]] === 3) caps[order[k]] = 2;
  }
  return caps;
}
function drawGroups(teams, z, headsAsFirst, seed, format) {
  const rand = rngFromSeed(seed);
  const n = teams.length;
  
  if (z < 1) return {error: 'El nº de zonas debe ser ≥ 1'};
  if (n < z) return {error: 'Hay menos equipos que zonas.'};

let capsBase;
if (format === 'custom') {
  const teamsPerZone = parseInt(document.getElementById('teamsPerZone').value) || 4;
  capsBase = capacitiesWithTeamsPerZone(n, z, teamsPerZone);
} else if (format === '4x6' && z === 4 && n <= 24) {
  capsBase = capacitiesFourBySix(n);
} else if (format === '8x3' && z === 8 && n <= 24) {
  capsBase = capacitiesEightByThree(n);
} else {
  capsBase = capacities(n, z);
}
  const actualZones = (format === 'custom') ? capsBase.length : z;
  const groups = Array.from({length: actualZones}, () => []);

  const fixedHeads = teams.filter(t => Number.isInteger(t.seedZone) && t.seedZone > 0);
  const usedFixedZones = new Set();

  for (const team of fixedHeads) {
    const zoneIndex = team.seedZone - 1;
    if (zoneIndex < 0 || zoneIndex >= actualZones) {
      return {error: `El equipo "${team.name}" está marcado como ${team.seedZone}*, pero el sorteo tiene ${actualZones} zonas.`};
    }
    if ((capsBase[zoneIndex] || 0) <= 0) {
      return {error: `La Zona ${team.seedZone} no tiene cupo disponible para ubicar a "${team.name}" como cabeza.`};
    }
    if (usedFixedZones.has(zoneIndex)) {
      return {error: `Hay más de un equipo marcado como ${team.seedZone}*. Dejá solo un cabeza fijo para la Zona ${team.seedZone}.`};
    }
    usedFixedZones.add(zoneIndex);
    groups[zoneIndex].push(team);
  }

  const fixedSet = new Set(fixedHeads);
  const plainHeads = shuffle(teams.filter(t => t.head && !fixedSet.has(t)), rand);
  const others = shuffle(teams.filter(t => !t.head && !fixedSet.has(t)), rand);
  
  if (headsAsFirst && plainHeads.length) {
    let nextHead = 0;
    for (let i = 0; i < groups.length && nextHead < plainHeads.length; i++) {
      if (groups[i].length < (capsBase[i] || 0)) {
        groups[i].push(plainHeads[nextHead]);
        nextHead++;
      }
    }
    // Si hay más cabezas simples que zonas/cupos iniciales, vuelven al bolillero general.
    for (; nextHead < plainHeads.length; nextHead++) {
      others.push(plainHeads[nextHead]);
    }
  }
  
  const targetCaps = capsBase.map((cap, i) => Math.max(0, cap - groups[i].length));
  const pool = headsAsFirst ? others : shuffle([...plainHeads, ...others], rand);

  const maxAttempts = 500;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    const g = groups.map(arr => [...arr]);
    const remaining = [...targetCaps];
    let ok = true;
    const order = shuffle(pool, rand);
    
    for (const team of order) {
      const options = g.map((arr, idx) => ({idx, size: arr.length, cap: remaining[idx]})).filter(x => x.cap > 0).sort((a, b) => a.size - b.size || a.idx - b.idx).map(x => x.idx);
      if (!options.length) { ok = false; break; }
      const pick = options[Math.floor(rand() * options.length)];
      g[pick].push(team);
      remaining[pick]--;
    }
    if (ok) return {groups: g, caps: capsBase, relaxed: false, attempt};
  }
  return {error: 'No se pudo asignar después de varios intentos'};
}

/* ====================== HTML paginado para imprimir/guardar PDF sin cortes ====================== */
function estimateRowsPerPrintedPage(groups) {
  const maxTeams = Math.max(0, ...groups.map(g => Array.isArray(g) ? g.length : 0));
  if (maxTeams <= 3) return 4;   // 8 zonas por página
  if (maxTeams <= 4) return 3;   // 6 zonas por página
  if (maxTeams <= 6) return 2;   // 4 zonas por página
  return 1;                      // zonas grandes: 2 zonas por página
}

function buildPagedZonesHTML(groups, chipsHTML, title, headerImage) {
  const rowsPerPage = estimateRowsPerPrintedPage(groups);
  const zonesPerPage = rowsPerPage * 2;
  const pages = [];

  for (let start = 0; start < groups.length; start += zonesPerPage) {
    const pageGroups = groups.slice(start, start + zonesPerPage);
    const pageIndex = pages.length;
    const zones = pageGroups.map((arr, localIndex) => {
      const gi = start + localIndex;
      const items = (arr || []).map(t => {
        const name = escapeHtml((t && t.name) ? t.name : String(t || ''));
        const province = (t && t.province) ? ` — ${escapeHtml(t.province)}` : '';
        const head = (t && t.head) ? ' (cabeza)' : '';
        return `<li><b>${name}</b>${province}${head}</li>`;
      }).join('');
      return `<div class="zone"><h4>Zona ${gi + 1}</h4><ol>${items}</ol></div>`;
    }).join('');

    pages.push(`
      <section class="pdf-page">
        ${buildPdfHeaderImageTag(headerImage)}
        <h1>${escapeHtml(title)}${pageIndex ? ' - continuación' : ''}</h1>
        <div class="chips">${chipsHTML}</div>
        <div class="page-grid">${zones}</div>
      </section>
    `);
  }

  return `<div class="pdf-pages">${pages.join('')}</div>`;
}

function buildDrawAnimationNames(names) {
  const unique = [];
  const seen = new Set();
  (names || []).forEach(value => {
    const name = String(value || '').trim();
    if (!name) return;
    const key = name.toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    unique.push(name);
  });

  const colors = ['#facc15','#38bdf8','#22c55e','#fb7185','#a78bfa','#f97316','#2dd4bf','#f472b6','#84cc16','#60a5fa','#e879f9','#fde047'];
  const ballNames = unique.slice(0, 24);
  const ballsHTML = ballNames.map((name, i) => {
    const shortName = name.length > 12 ? name.slice(0, 11) + '…' : name;
    const angle = Math.round((360 / Math.max(ballNames.length, 1)) * i);
    const radius = 58 + ((i % 3) * 24);
    const delay = (i % 8) * 90;
    const color = colors[i % colors.length];
    return `<span class="lottery-ball" style="--i:${i};--angle:${angle}deg;--radius:${radius}px;--ball-bg:${color};--delay:${delay}ms">${escapeHtml(shortName)}</span>`;
  }).join('');

  const flowHTML = unique.map((name, i) => {
    const color = colors[i % colors.length];
    const delay = Math.min(2400, i * 85);
    return `<span class="flow-team" style="--delay:${delay}ms;--accent:${color}">${escapeHtml(name)}</span>`;
  }).join('');

  return { ballsHTML, flowHTML, count: unique.length };
}

  </style>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"><\/script>
  </head><body>
    <div id="drawLoader" class="draw-loader">
      <div class="lottery-scene">
        <div class="lottery-machine" aria-hidden="true">
          <div class="lottery-stand"></div>
          <div class="lottery-handle"></div>
          <div class="lottery-drum">

      <button class="btn primary" onclick="exportPDF()">🖨️ Exportar PDF directo</button>
    </div>
    <script>
      setTimeout(function(){
        var loader = document.getElementById('drawLoader');
        var result = document.getElementById('resultContainer');
        if (result) {
          result.classList.add('result-ready');
          result.classList.add('result-in');
        }
        if (loader) {
          loader.classList.add('loader-out');
          setTimeout(function(){ loader.style.display = 'none'; }, 650);
        }
      }, 3000);

      function exportPDF(){
        if(!window.jspdf){alert('Librería PDF no cargada');return}
        const zonesMarkup=${JSON.stringify(zonesHTML)};
        const chipsMarkup=${JSON.stringify(chipsHTML)};
        const pdfHeaderImage=${JSON.stringify((typeof pdfHeaderImage !== 'undefined' && pdfHeaderImage) ? pdfHeaderImage : null)};
        const { jsPDF }=window.jspdf;
        const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
        const pageW=pdf.internal.pageSize.getWidth();
        const pageH=pdf.internal.pageSize.getHeight();
        const margin=36;
        const bottomMargin=84;
        const gap=12;
        const colW=(pageW-(margin*2)-gap)/2;
        let y=margin;

        function pdfHeaderImageType(dataUrl){
          return String(dataUrl || '').indexOf('image/jpeg') >= 0 ? 'JPEG' : 'PNG';
        }
        function drawPdfHeaderImage(){
          if(!pdfHeaderImage || !pdfHeaderImage.dataUrl) return;
          const maxW=pageW-(margin*2);
          const maxH=50;
          const imgW=Number(pdfHeaderImage.width)||maxW;
          const imgH=Number(pdfHeaderImage.height)||40;
          let drawW=Math.min(maxW,imgW);
          let drawH=drawW*imgH/imgW;
          if(drawH>maxH){drawH=maxH;drawW=drawH*imgW/imgH;}
          const x=margin+(maxW-drawW)/2;
          try{
            pdf.addImage(pdfHeaderImage.dataUrl,pdfHeaderImageType(pdfHeaderImage.dataUrl),x,y,drawW,drawH);
            y+=drawH+28;
          }catch(e){
            console.warn('No se pudo dibujar el encabezado PDF',e);
          }
        }

        function cleanText(value){
          let text = String(value || '');
          text = text.split(String.fromCharCode(160)).join(' ');
          text = text.split(String.fromCharCode(9)).join(' ');
          text = text.split(String.fromCharCode(10)).join(' ');
          text = text.split(String.fromCharCode(13)).join(' ');
          while (text.indexOf('  ') !== -1) text = text.split('  ').join(' ');
          return text.trim();
        }
        function chipsFromHTML(html){
          const box=document.createElement('div');
          box.innerHTML=html||'';
          return Array.from(box.querySelectorAll('.chip')).map(function(el){return cleanText(el.textContent);}).filter(Boolean);
        }
        function zonesFromHTML(html){
          const box=document.createElement('div');
          box.innerHTML=html||'';
          return Array.from(box.children).map(function(el,idx){
            const titleEl=el.querySelector('h4');
            const itemEls=Array.from(el.querySelectorAll('li'));
            return {
              title: cleanText(titleEl ? titleEl.textContent : ('Zona '+(idx+1))),
              items: itemEls.map(function(li){return cleanText(li.textContent);}).filter(Boolean)
            };
          });
        }
        function drawHeader(isContinuation){
          drawPdfHeaderImage();
          const title='Resultado del Sorteo' + (isContinuation ? ' - continuación' : '');
          pdf.setTextColor(15,23,42);
          pdf.setFont('helvetica','bold');
          pdf.setFontSize(14);
          pdf.text(title, margin, y);
          y+=22;
          const chips=chipsFromHTML(chipsMarkup);
          if(chips.length){
            pdf.setFont('helvetica','normal');
            pdf.setFontSize(8.5);
            pdf.setDrawColor(148,229,242);
            pdf.setFillColor(255,255,255);
            let x=margin;
            chips.forEach(function(chip){
              let chipText=chip;
              let w=pdf.getTextWidth(chipText)+14;
              const maxW=pageW-(margin*2);
              if(w>maxW){
                chipText=chipText.slice(0,90)+'...';
                w=Math.min(pdf.getTextWidth(chipText)+14,maxW);
              }
              if(x+w>pageW-margin){
                x=margin;
                y+=17;
              }
              pdf.roundedRect(x,y-10,w,15,7,7,'S');
              pdf.text(chipText,x+7,y);
              x+=w+6;
            });
            y+=23;
          }else{
            y+=8;
          }
        }
        function wrappedLines(text,width,fontSize,fontStyle){
          pdf.setFont('helvetica',fontStyle||'normal');
          pdf.setFontSize(fontSize||10);
          return pdf.splitTextToSize(cleanText(text),width);
        }
        function zoneHeight(zone){
          let h=42;
          zone.items.forEach(function(item,idx){
            const label=(idx+1)+'. '+item;
            const lines=wrappedLines(label,colW-24,10.5,'normal');
            h+=lines.length*13+3;
          });
          return Math.max(96,h+8);
        }
        function drawZone(zone,x,top,w,h){
          pdf.setDrawColor(34,48,70);
          pdf.setLineWidth(0.8);
          pdf.setFillColor(255,255,255);
          pdf.roundedRect(x,top,w,h,5,5,'S');
          pdf.setTextColor(15,23,42);
          pdf.setFont('helvetica','bold');
          pdf.setFontSize(13);
          pdf.text(zone.title,x+12,top+22);
          pdf.setDrawColor(148,229,242);
          pdf.setLineWidth(0.6);
          pdf.line(x+12,top+31,x+w-12,top+31);
          let yy=top+53;
          zone.items.forEach(function(item,idx){
            const label=(idx+1)+'. '+item;
            const lines=wrappedLines(label,w-24,10.5,'normal');
            pdf.setTextColor(15,23,42);
            pdf.setFont('helvetica','normal');
            pdf.setFontSize(10.5);
            pdf.text(lines,x+12,yy);
            yy+=lines.length*13+3;
          });
        }
        function addPage(){
          pdf.addPage();
          y=margin;
          drawHeader(true);
        }

        const zones=zonesFromHTML(zonesMarkup);
        drawHeader(false);
        for(let i=0;i<zones.length;i+=2){
          const left=zones[i];
          const right=zones[i+1]||null;
          const leftH=zoneHeight(left);
          const rightH=right ? zoneHeight(right) : leftH;
          const rowH=Math.max(leftH,rightH);
          if(y+rowH>pageH-bottomMargin && y>margin+40){
            addPage();
          }
          if(rowH>pageH-margin-bottomMargin){
            // Caso extremo: si una zona individual es demasiado alta, se dibuja igualmente desde arriba.
            // En los sorteos normales no debería ocurrir, pero evita que el PDF falle.
          }
          drawZone(left,margin,y,colW,rowH);
          if(right) drawZone(right,margin+colW+gap,y,colW,rowH);
          y+=rowH+10;
        }
        pdf.save(${JSON.stringify(exportFilename)});
      }<\/script>
  </body></html>`;

  w.document.open();
  w.document.write(html);
  w.document.close();
}

    <script>

      function exportPDF(){
        if(!window.jspdf){alert('Librería PDF no cargada');return}
        const listMarkup=${JSON.stringify(listHTML)};
        const chipsMarkup=${JSON.stringify(chipsHTML)};
        const pdfHeaderImage=${JSON.stringify((typeof pdfHeaderImage !== 'undefined' && pdfHeaderImage) ? pdfHeaderImage : null)};
        const { jsPDF }=window.jspdf;
        const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
        const pageW=pdf.internal.pageSize.getWidth();

        const margin=40;

        function pdfHeaderImageType(dataUrl){
          return String(dataUrl || '').indexOf('image/jpeg') >= 0 ? 'JPEG' : 'PNG';
        }
        function drawPdfHeaderImage(){
          if(!pdfHeaderImage || !pdfHeaderImage.dataUrl) return;
          const maxW=pageW-(margin*2);
          const maxH=50;
          const imgW=Number(pdfHeaderImage.width)||maxW;
          const imgH=Number(pdfHeaderImage.height)||40;
          let drawW=Math.min(maxW,imgW);
          let drawH=drawW*imgH/imgW;

          const h=lines.length*14+7;

          pdf.setTextColor(15,23,42);
          pdf.setFont('helvetica','normal');
          pdf.setFontSize(11);
          pdf.text(lines,margin,y);
          y+=h;
        });
        pdf.save(${JSON.stringify(exportFilename)});
      }<\/script>

function normalizeCloudFilterValue(value) {
  let s = String(value == null ? '' : value).trim().toLowerCase();
  try {
    s = s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  } catch (e) {}
  return s;
}

function getCloudSystemLabel(d) {
  if (d && d.type === 'simple') return 'Orden de paso';
  const fmt = String((d && d.format) ? d.format : '').trim();
  if (fmt === '8x3') return '8x3';
  if (fmt === '4x6') return '4x6';
  if (fmt === 'custom') {
    const zones = d && d.zones ? String(d.zones) : '';
    return zones ? 'Definir Zonas (' + zones + ')' : 'Definir Zonas';
  }
  return fmt || 'Zonas';
}

function getCloudFilterSelectIds() {
  return [
    'cloudFilterEvent',
    'cloudFilterDiscipline',
    'cloudFilterCategory',
    'cloudFilterGender',
    'cloudFilterModality',
    'cloudFilterSystem'
  ];
}

function updateSelectOptionsFromMap(select, valuesMap, defaultText) {
  if (!select) return;
  const current = select.value || '';
  const entries = Array.from(valuesMap.entries()).sort(function(a, b) {
    return String(a[1]).localeCompare(String(b[1]), 'es', { sensitivity: 'base' });
  });
  select.innerHTML = '<option value="">' + defaultText + '</option>';
  entries.forEach(function(entry) {
    const option = document.createElement('option');
    option.value = entry[0];
    option.textContent = entry[1];
    select.appendChild(option);
  });
  if (current && valuesMap.has(current)) {
    select.value = current;
  } else {
    select.value = '';
  }
}

function refreshCloudFilterOptions() {
  const items = Array.from(document.querySelectorAll('#cloudHistoryList .item'));
  const maps = {
    cloudFilterEvent: new Map(),
    cloudFilterDiscipline: new Map(),
    cloudFilterCategory: new Map(),
    cloudFilterGender: new Map(),
    cloudFilterModality: new Map(),
    cloudFilterSystem: new Map()
  };

  function add(map, raw) {
    const label = String(raw == null ? '' : raw).trim();
    if (!label) return;
    const key = normalizeCloudFilterValue(label);
    if (!map.has(key)) map.set(key, label);
  }

  items.forEach(function(item) {
    add(maps.cloudFilterEvent, item.dataset.cloudEventLabel || '');
    add(maps.cloudFilterDiscipline, item.dataset.cloudDisciplineLabel || '');
    add(maps.cloudFilterCategory, item.dataset.cloudCategoryLabel || '');
    add(maps.cloudFilterGender, item.dataset.cloudGenderLabel || '');
    add(maps.cloudFilterModality, item.dataset.cloudModalityLabel || '');
    add(maps.cloudFilterSystem, item.dataset.cloudSystemLabel || '');
  });

  updateSelectOptionsFromMap(document.getElementById('cloudFilterEvent'), maps.cloudFilterEvent, 'Todos');
  updateSelectOptionsFromMap(document.getElementById('cloudFilterDiscipline'), maps.cloudFilterDiscipline, 'Todas');
  updateSelectOptionsFromMap(document.getElementById('cloudFilterCategory'), maps.cloudFilterCategory, 'Todas');
  updateSelectOptionsFromMap(document.getElementById('cloudFilterGender'), maps.cloudFilterGender, 'Todos');
  updateSelectOptionsFromMap(document.getElementById('cloudFilterModality'), maps.cloudFilterModality, 'Todas');
  updateSelectOptionsFromMap(document.getElementById('cloudFilterSystem'), maps.cloudFilterSystem, 'Todos');
}

function getVisibleCloudCheckboxes() {
  return Array.from(document.querySelectorAll('input.cloud-draw-checkbox')).filter(function(cb) {
    const item = cb.closest ? cb.closest('.item') : null;

}

function updateSelectAllCloudState() {
  const selectAll = document.getElementById('selectAllCloudBtn');
  if (!selectAll) return;
  const visibleCheckboxes = getVisibleCloudCheckboxes();
  const checkedVisible = visibleCheckboxes.filter(function(cb) { return cb.checked; });
  selectAll.checked = visibleCheckboxes.length > 0 && checkedVisible.length === visibleCheckboxes.length;
}

function applyCloudFilters() {
  const filters = {
    event: document.getElementById('cloudFilterEvent')?.value || '',
    discipline: document.getElementById('cloudFilterDiscipline')?.value || '',
    category: document.getElementById('cloudFilterCategory')?.value || '',
    gender: document.getElementById('cloudFilterGender')?.value || '',
    modality: document.getElementById('cloudFilterModality')?.value || '',
    system: document.getElementById('cloudFilterSystem')?.value || '',
    search: normalizeCloudFilterValue(document.getElementById('cloudFilterSearch')?.value || '')
  };

  const items = Array.from(document.querySelectorAll('#cloudHistoryList .item'));
  let visible = 0;

  items.forEach(function(item) {
    let show = true;
    if (filters.event && item.dataset.cloudEvent !== filters.event) show = false;
    if (filters.discipline && item.dataset.cloudDiscipline !== filters.discipline) show = false;
    if (filters.category && item.dataset.cloudCategory !== filters.category) show = false;
    if (filters.gender && item.dataset.cloudGender !== filters.gender) show = false;
    if (filters.modality && item.dataset.cloudModality !== filters.modality) show = false;
    if (filters.system && item.dataset.cloudSystem !== filters.system) show = false;
    if (filters.search && normalizeCloudFilterValue(item.textContent || '').indexOf(filters.search) === -1) show = false;

    item.style.display = show ? 'flex' : 'none';
    const cb = item.querySelector ? item.querySelector('input.cloud-draw-checkbox') : null;
    if (!show && cb) cb.checked = false;
    if (show) visible++;
  });

  const status = document.getElementById('cloudFilterStatus');
  if (status && items.length) {
    status.textContent = 'Mostrando ' + visible + ' de ' + items.length + ' sorteo(s) guardado(s).';
  } else if (status) {
    status.textContent = '';
  }
  updateSelectAllCloudState();
}

function clearCloudFilters() {
  getCloudFilterSelectIds().forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const search = document.getElementById('cloudFilterSearch');
  if (search) search.value = '';
  applyCloudFilters();
}

function setupCloudFilterControls() {
  getCloudFilterSelectIds().forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', applyCloudFilters);
  });
  const search = document.getElementById('cloudFilterSearch');
  if (search) search.addEventListener('input', applyCloudFilters);
  const clearBtn = document.getElementById('btnClearCloudFilters');
  if (clearBtn) clearBtn.addEventListener('click', clearCloudFilters);
}

          return String(dataUrl || '').indexOf('image/jpeg') >= 0 ? 'JPEG' : 'PNG';
        }
        function drawPdfHeaderImage(){
          if(!pdfHeaderImage || !pdfHeaderImage.dataUrl) return;
          const maxW=pageW-(margin*2);
          const maxH=50;
          const imgW=Number(pdfHeaderImage.width)||maxW;
          const imgH=Number(pdfHeaderImage.height)||40;
          let drawW=Math.min(maxW,imgW);
          let drawH=drawW*imgH/imgW;
          if(drawH>maxH){drawH=maxH;drawW=drawH*imgW/imgH;}
          const x=margin+(maxW-drawW)/2;

            pdf.addImage(pdfHeaderImage.dataUrl,pdfHeaderImageType(pdfHeaderImage.dataUrl),x,y,drawW,drawH);

          text = text.split(String.fromCharCode(9)).join(' ');
          text = text.split(String.fromCharCode(10)).join(' ');
          text = text.split(String.fromCharCode(13)).join(' ');

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function() {
    URL.revokeObjectURL(url);
  }, 1000);
}

function pdfCleanText(value) {
  let text = String(value == null ? '' : value);
  text = text.split(String.fromCharCode(160)).join(' ');
  text = text.split(String.fromCharCode(9)).join(' ');
  text = text.split(String.fromCharCode(10)).join(' ');
  text = text.split(String.fromCharCode(13)).join(' ');
  while (text.indexOf('  ') !== -1) text = text.split('  ').join(' ');
  return text.trim();
}

function cloudDrawDateString(d) {
  try {
    if (d && d.createdAt && typeof d.createdAt.toDate === 'function') {
      return d.createdAt.toDate().toLocaleString();
    }
  } catch(e) {}
  return '—';
}

function normalizeCloudGroupsForPDF(d) {
  const rawGroups = Array.isArray(d && d.groups) ? d.groups : [];
  return rawGroups.map(function(group) {
    const teams = Array.isArray(group) ? group : (Array.isArray(group && group.teams) ? group.teams : []);
    return teams.map(function(team) {
      if (typeof team === 'string') {
        return { name: team, province: '', head: false, seedZone: null };
      }
      return {
        name: (team && team.name) ? String(team.name) : '',
        province: (team && team.province) ? String(team.province) : '',
        head: !!(team && team.head),
        seedZone: (team && team.seedZone) ? parseInt(team.seedZone, 10) : null
      };
    }).filter(function(team) {
      return !!team.name;
    });
  });
}

function makeUniqueZipFilename(filename, usedNames) {
  let base = String(filename || 'sorteo.pdf');
  if (base.toLowerCase().slice(-4) !== '.pdf') base += '.pdf';
  let candidate = base;
  let counter = 2;
  while (usedNames[candidate]) {
    const lower = base.toLowerCase();
    const stem = lower.slice(-4) === '.pdf' ? base.slice(0, -4) : base;
    candidate = stem + '_' + counter + '.pdf';
    counter++;
  }
  usedNames[candidate] = true;
  return candidate;
}

      const item = (idx + 1) + '. ' + name;
      const lines = pdf.splitTextToSize(pdfCleanText(item), pageW - (margin * 2));
      const h = (lines.length * 14) + 7;
      if (y + h > pageH - bottomMargin) addPage();
      pdf.setTextColor(15, 23, 42);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(11);
      pdf.text(lines, margin, y);
      y += h;
    });
  } else {
    for (let i = 0; i < groups.length; i += 2) {
      const left = groups[i];
      const right = groups[i + 1] || null;
      const leftH = zoneHeight(left);
      const rightH = right ? zoneHeight(right) : leftH;
      const rowH = Math.max(leftH, rightH);

      if (y + rowH > pageH - bottomMargin && y > margin + 40) {
        addPage();
      }

      drawZone(left, i, margin, y, colW, rowH);
      if (right) drawZone(right, i + 1, margin + colW + gap, y, colW, rowH);
      y += rowH + 10;
    }
  }

  return pdf.output('blob');
}

async function downloadSelectedCloudPDFsZip(buttonEl) {
  const ids = selectedCloudDrawIds();
  if (!ids.length) {
    toast('No hay sorteos seleccionados');
    return;
  }
  if (!auth.currentUser) {
    toast('No estás autenticado');
    return;
  }
  if (!window.JSZip) {
    toast('No se cargó la librería ZIP. Probá recargar la página.');
    return;
  }
  if (!window.jspdf || !window.jspdf.jsPDF) {
    toast('No se cargó la librería PDF. Probá recargar la página.');
    return;
  }

  const originalText = buttonEl ? buttonEl.textContent : '';
  if (buttonEl) {
    buttonEl.disabled = true;
    buttonEl.textContent = 'Preparando ZIP...';
  }

  try {
    const user = auth.currentUser;
    const zip = new JSZip();
    const usedNames = {};
    let added = 0;

    for (let i = 0; i < ids.length; i++) {
      if (buttonEl) buttonEl.textContent = 'Preparando PDF ' + (i + 1) + ' de ' + ids.length + '...';

      const snap = await db.collection('users').doc(user.uid).collection('draws').doc(ids[i]).get();
      if (!snap.exists) continue;

      const d = snap.data();
      const blob = generateCloudDrawPDFBlob(d);
      const baseName = buildExportFilename('pdf', getCloudMetaForFilename(d));
      const filename = makeUniqueZipFilename(baseName, usedNames);
      zip.file(filename, blob);
      added++;
    }

    if (!added) {
      toast('No se encontraron sorteos válidos para exportar');
      return;
    }

    if (buttonEl) buttonEl.textContent = 'Generando ZIP...';
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const today = new Date().toISOString().slice(0, 10);
    downloadBlob(zipBlob, 'sorteos_seleccionados_' + today + '.zip');
    toast('ZIP descargado con ' + added + ' PDF(s)');
  } catch (err) {
    console.error('Error generando ZIP de PDFs:', err);
    toast('Error al generar el ZIP de PDFs');
  } finally {
    if (buttonEl) {
      buttonEl.disabled = false;
      buttonEl.textContent = originalText || '⬇️ Descargar ZIP de PDFs';
    }
  }
}

function decodeArrayBufferWithFallback(buf) {
  // 1) Intentar UTF-8
  let text = '';
  try {
    text = new TextDecoder('utf-8').decode(buf);
  } catch(e) {
    text = '';
  }
  // 2) Si aparecen caracteres de reemplazo, probar ISO-8859-1 (Excel suele exportar así)
  if (text && text.includes('\uFFFD')) {
    try {
      text = new TextDecoder('iso-8859-1').decode(buf);
    } catch(e) {}
  }
  return text;
}

async function fetchTextWithFallback(url) {
  const resp = await fetch(url, { cache: 'no-store' });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const buf = await resp.arrayBuffer();
  return decodeArrayBufferWithFallback(buf);
}

document.addEventListener('click', function(e) {
  if (e.target.id === 'deleteSelectedCloud') {
    const checkboxes = document.querySelectorAll('input.cloud-draw-checkbox:checked');
    if (checkboxes.length === 0) {
      toast('No hay sorteos seleccionados');
      return;
    }

    if (!confirm(`¿Estás seguro de que querés eliminar ${checkboxes.length} sorteo(s)?`)) {
      return;
    }

    const user = auth.currentUser;
    if (!user) {
      toast('No estás autenticado');
      return;
    }

    const deletePromises = Array.from(checkboxes).map(checkbox => 
      db.collection('users').doc(user.uid).collection('draws').doc(checkbox.dataset.docId).delete()
    );
    
    Promise.all(deletePromises)
      .then(() => toast(`${checkboxes.length} sorteo(s) eliminado(s)`))
      .catch(err => {
        console.error('Error eliminando sorteos:', err);
        toast('Error al eliminar los sorteos');
      });
  }
});

// Cargar sorteo compartido desde URL (versión simple)
function loadSharedDrawFromURL() {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedData = urlParams.get('shared');
  
  if (sharedData) {
    try {
      // Limpiar parámetro de la URL
      window.history.replaceState({}, '', window.location.pathname);
      
      const drawData = JSON.parse(decodeURIComponent(sharedData));
      
      // Mostrar diálogo de confirmación
      if (confirm(`¿Querés ver el sorteo compartido?\n${drawData.eventName ? 'Evento: ' + drawData.eventName + '\n' : ''}${drawData.discipline ? 'Disciplina: ' + drawData.discipline + '\n' : ''}${drawData.teamsCount} equipos`)) {
        showSharedDraw(drawData);
      }
    } catch (e) {
      console.error('Error cargando sorteo compartido:', e);
      toast('Error al cargar el sorteo compartido');
    }
  }
}

function showSharedDraw(drawData) {
  const w = window.open('', '_blank');
  if (!w) {
    toast('Permití pop-ups para ver el sorteo compartido');
    return;
  }
  
  let htmlContent = '';
  
  if (drawData.type === 'simple') {
    // HTML para sorteo simple compartido
    htmlContent = generateSimpleSharedHTML(drawData);
  } else {
    // HTML para sorteo por zonas compartido
    htmlContent = generateZonesSharedHTML(drawData);
  }
  
  w.document.open();
  w.document.write(htmlContent);
  w.document.close();
}

  // Cambiar logos
  const logos = document.querySelectorAll('.logo');
  logos.forEach(logo => {

      logo.src = 'logo-dark.png';
    }
  });
