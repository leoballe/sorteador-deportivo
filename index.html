<style>
:root{--bg:#0f172a;--panel:#111827;--card:#1f2937;--muted:#94a3b8;--text:#e5e7eb;--accent:#22c55e;--accent2:#38bdf8;--danger:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}
a{color:var(--accent2)} .container{max-width:1100px;margin:0 auto;padding:24px}
header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:16px}
h1{font-size:clamp(22px,3vw,30px);margin:0;color:#94E5F2}
.badge{font-size:12px;background-color:#94E5F2;opacity:.9;padding:4px 8px;border-radius:999px;color:#000;font-weight:bold}
.userBox{display:flex;align-items:center;gap:8px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border:1px solid #1B315E;border-radius:999px;background:#0b1220;color:#fff}
.btn{background:#0b1220;color:var(--text);border:1px solid #223046;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600}
.btn:hover{border-color:#3b82f6} .btn.primary{border:0;color:#052e16;background-color:#94E5F2}
.btn.ghost{background:transparent;border-color:#2b3b55} .btn.warn{border:0;color:#fff;background-color:#8A0002}
.tiny{font-size:13px;color:#94E5F2;font-weight:bold} .hidden{display:none}
.panel{background:var(--panel);border:1px solid #1f2937;border-radius:16px;padding:16px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px} @media (max-width:900px){.row{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid #243042;border-radius:14px;padding:14px}
.card h3{margin:0 0 8px 0;font-size:16px;color:#94E5F2}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input[type=text],input[type=number],input[type=email],input[type=password],textarea,select{width:100%;background:#0b1220;color:var(--text);border:1px solid #223046;border-radius:10px;padding:10px;font-size:14px}
textarea{min-height:200px;resize:vertical} .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.tabs{display:flex;gap:8px;margin-bottom:12px} .tab{padding:8px 12px;border-radius:10px;border:1px solid #223046;background:#0b1220;cursor:pointer;color:#e5e7eb}
.tab.active{background-color:#1B315E;border-color:#1B315E;color:#94E5F2;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.zone{background:#0b1220;border:1px solid #223046;border-radius:14px;padding:10px}
.zone h4{margin:4px 0 8px 0} .zone ol{margin:0;padding-left:18px}
.muted{color:var(--muted)} .warnText{color:var(--warn)} .errorText{color:var(--danger)}
.history{display:grid;gap:8px} .history .item{background:#0b1220;border:1px dashed #2b3b55;padding:8px;border-radius:10px;font-size:13px}
.listWrap{display:grid;grid-template-columns:1fr 1fr;gap:12px} @media (max-width:900px){.listWrap{grid-template-columns:1fr}}
.listBox{background:#0b1220;border:1px dashed #2b3b55;border-radius:12px;padding:10px;min-height:120px}
.listBox h4{margin:2px 0 8px 0;font-size:14px} .itemRow{display:flex;align-items:center;gap:8px;padding:4px 6px;border-bottom:1px dashed #1f2a3b}
.itemRow:last-child{border-bottom:none} .tag{font-size:11px;color:#cbd5e1;border:1px solid #334155;border-radius:999px;padding:1px 6px}
[data-theme="light"] {--bg:#f1f5f9;--panel:#fff;--card:#f8fafc;--muted:#64748b;--text:#1e293b;--accent:#22c55e;--accent2:#38bdf8;--danger:#ef4444;--warn:#f59e0b}
[data-theme="light"] .btn{background:#e2e8f0;color:#1e293b;border:1px solid #cbd5e1} [data-theme="light"] .btn.primary{background-color:#94E5F2;color:#052e16}
[data-theme="light"] .btn.warn{background-color:#8A0002;color:#fff}
[data-theme="light"] input[type=text],[data-theme="light"] input[type=number],[data-theme="light"] input[type=email],[data-theme="light"] input[type=password],[data-theme="light"] textarea,[data-theme="light"] select{background:#fff;color:#1e293b;border:1px solid #cbd5e1}
[data-theme="light"] h1,[data-theme="light"] .card h3,[data-theme="light"] .tiny,[data-theme="light"] .listBox h4,[data-theme="light"] .zone h4{color:#1B315E}
[data-theme="light"] .pill{background:#e2e8f0;border-color:#cbd5e1;color:#1e293b} [data-theme="light"] .tab.active{background-color:#1B315E;border-color:#1B315E;color:#94E5F2}
[data-theme="light"] .tab{background:#e2e8f0;border-color:#cbd5e1;color:#1e293b} [data-theme="light"] .tag{color:#1e293b;border-color:#cbd5e1;background:#e2e8f0}
[data-theme="light"] .listBox,[data-theme="light"] .history .item{background:#fff;border:1px dashed #cbd5e1} [data-theme="light"] .itemRow{border-bottom:1px dashed #e2e8f0}
[data-theme="light"] .zone,[data-theme="light"] .panel{background:#fff;border:1px solid #e2e8f0} [data-theme="light"] .card{background:#f8fafc;border:1px solid #e2e8f0}
[data-theme="light"] .cloud-draw-checkbox{accent-color:#1B315E} [data-theme="light"] .item{color:#1e293b}
</style>

<body>
  <section id="authSection" style="max-width:460px;margin:48px auto">
    <div class="authBrand" style="display:flex;align-items:left;justify-content:center;gap:10px;margin-bottom:14px">

      <h1 style="position: absolute; left: -10000px; top: 50px; width: 1px; height: 1px; overflow: hidden;">🎲 Sorteador Deportivo</h1>
    </div>
    <div class="card" style="background:var(--panel);border:1px solid #1f2937;border-radius:16px;padding:16px">

      </div>

        <div class="formGroup" style="margin-bottom:12px"><label>Confirmar Contraseña</label><input type="password" id="registerConfirmPassword" required placeholder="••••••••"></div>
        <button type="submit" class="btn primary" style="width:100%">Crear Cuenta</button>

  <section id="appSection"> 
    <div class="authBrand" style="display:flex;align-items:left;justify-content:center;gap:10px;margin-bottom:14px">
      <img src="logo-dark.png" alt="Logo" class="logo" style="height: 100px; width: auto; padding-top: 40px;">
      <h1 style="position: absolute; left: -10000px; top: 50px; width: 1px; height: 1px; overflow: hidden;">🎲 Sorteador Deportivo</h1>
    </div>
    <div class="container">
      <header>
        <div><h1>Sorteador</h1><div class="tiny">Juegos Nacionales</div></div>
        <div class="userBox"><span class="pill" id="userInfo" title="Usuario"></span><button id="themeToggle" class="btn ghost">🌙 Tema</button><button id="logoutBtn" class="btn ghost">Cerrar sesión</button><span class="badge">v3.0 </span></div>
      </header>
      <div class="panel">
        <div id="tab-grupos" class="tabcontent">
          <div class="row">
            <div class="card">
              <h3>Equipos</h3>
              <label>Pegá la lista (una línea por equipo). Opcional: <span class="pill">, *</span> para cabeza de serie.</label>
              <textarea id="teamsInput" placeholder="Ejemplos:&#10;River Plate, CABA, *&#10;Boca Juniors, CABA&#10;Newell's, Santa Fe"></textarea>
              <div class="controls" style="margin-top:8px">
                <label for="csvFile" class="btn ghost">📄 Importar CSV de equipos</label>
                <input id="csvFile" type="file" accept=".csv,text/csv" class="hidden" />
                <button class="btn ghost" id="btnExample" type="button">Cargar ejemplo</button>
                <button class="btn ghost" id="btnClear" type="button">Limpiar</button>
                <button class="btn" id="btnBuildList" type="button">Mostrar checks</button>
              </div>
              <div class="tiny hidden">CSV de equipos:.</div><div id="csvInfo" class="tiny" style="margin-top:6px"></div>
              <div id="checkLists" class="listWrap hidden" style="margin-top:10px">
                <div class="listBox">
                  <h4>Activos <span class="tag" id="countActive">0</span></h4>
                  <div class="controls" style="margin-bottom:6px"><label class="pill"><input type="checkbox" id="selectAllActive"> Seleccionar todos</label><button class="btn warn tiny" id="btnMoveToInactive" type="button">Descartar seleccionados ➜</button></div>
                  <div id="activeList"></div>
                </div>
                <div class="listBox">
                  <h4>Descartados <span class="tag" id="countInactive">0</span></h4>
                  <div class="controls" style="margin-bottom:6px"><label class="pill"><input type="checkbox" id="toggleShowInactive" checked> Mostrar descartados</label><label class="pill"><input type="checkbox" id="selectAllInactive"> Seleccionar todos</label><button class="btn primary tiny" id="btnRestoreSelected" type="button">⬅ Restaurar seleccionados</button></div>
                  <div id="inactiveList" class="hidden"></div>
                </div>
              </div>
            </div>
            <div class="card">
              <h3>Parámetros</h3>
              <div class="controls" style="margin-bottom:12px"><div style="min-width:220px;flex:1"><label>Nombre del Evento</label><input type="text" id="eventNameInput" placeholder="Ej: Juegos Nacionales Evita" style="width:100%"></div></div>
              <div class="controls" id="formatRow"><label class="pill"><input type="radio" name="format" value="8x3" checked> 8x3</label><label class="pill"><input type="radio" name="format" value="4x6"> 4x6</label><label class="pill"><input type="radio" name="format" value="custom"> Definir Zonas</label><label class="pill"><input type="radio" name="format" value="simple"> Orden de paso</label></div>
              <div class="controls"><div style="min-width:160px;flex:1" class="hidden" id="customZonesContainer"><label>Nº de zonas / grupos</label><input type="number" id="zones" min="1" value="8" /></div><div style="min-width:160px;flex:1" class="hidden" id="customTeamsPerZoneContainer"><label>Equipos por zona</label><input type="number" id="teamsPerZone" min="2" value="4" /></div></div>
              <div class="controls"><label for="csvDisciplines" class="btn ghost">📄 Importar CSV de disciplinas</label><input id="csvDisciplines" type="file" accept=".csv,text/csv" class="hidden" /><div style="min-width:220px;flex:1"><label>Disciplina</label><select id="disciplineSelect"><option value="">— Seleccionar disciplina —</option></select></div></div>
              <div class="controls" style="margin-top:4px"><div style="min-width:160px;flex:1"><input type="text" id="newDisciplineInput" placeholder="Nueva disciplina" style="width:100%"></div><button class="btn tiny" id="btnAddDiscipline">Agregar disciplina</button></div>
              <div class="controls"><label for="csvCategories" class="btn ghost">📄 Importar CSV de categorías</label><input id="csvCategories" type="file" accept=".csv,text/csv" class="hidden" /><div style="min-width:220px;flex:1"><label>Categoría</label><select id="categorySelect"><option value="">— Seleccionar categoría —</option></select></div></div>
              <div class="controls" style="margin-top:4px"><div style="min-width:160px;flex:1"><input type="text" id="newCategoryInput" placeholder="Nueva categoría" style="width:100%"></div><button class="btn tiny" id="btnAddCategory">Agregar categoría</button></div>
              <div class="controls"><label for="csvModalities" class="btn ghost">📄 Importar CSV de modalidades</label><input id="csvModalities" type="file" accept=".csv,text/csv" class="hidden" /><div style="min-width:220px;flex:1"><label>Modalidad</label><select id="modalitySelect"><option value="">— Seleccionar modalidad —</option></select></div></div>
              <div class="controls" style="margin-top:4px"><div style="min-width:160px;flex:1"><input type="text" id="newModalityInput" placeholder="Nueva modalidad" style="width:100%"></div><button class="btn tiny" id="btnAddModality">Agregar modalidad</button></div>
              <div class="controls"><div style="min-width:220px;flex:1"><label>Género</label><select id="genderSelect"><option value="">— Seleccionar género —</option><option value="Masculino">Masculino</option><option value="Femenino">Femenino</option><option value="Mixto">Mixto</option><option value="No Aplica">No Aplica</option></select></div></div>
              <div id="discCSVInfo" class="tiny" style="margin-top:4px"></div><div id="catCSVInfo" class="tiny" style="margin-top:4px"></div><div id="modCSVInfo" class="tiny" style="margin-top:4px"></div>
              <label><input type="checkbox" id="headsAsFirst" > Cabezas de serie primero</label><div id="capInfo" class="tiny" style="margin-top:6px"></div>
              <div class="controls" style="margin-top:10px"><button class="btn primary" id="btnDrawGroups" type="button">Sortear</button><button class="btn hidden" id="btnExportCSV" type="button">⬇️ Exportar CSV</button><button class="btn hidden" id="btnCopy" type="button">📋 Copiar</button><button class="btn hidden" id="btnShare" type="button">🔗 Compartir</button></div>
              <div id="status" class="tiny" style="margin-top:8px"></div>
            </div>
          </div>
          <div class="card" style="margin-top:12px"><h3>Resultado</h3><div id="resultGroups" class="grid"></div></div>
          <div class="card" style="margin-top:12px"><h3>Historial de sorteos guardados</h3><div class="controls" style="margin-bottom:12px"><label class="pill"><input type="checkbox" id="selectAllCloudBtn"> Seleccionar todos</label><button class="btn tiny warn" id="deleteSelectedCloud">Eliminar seleccionados</button></div><div id="cloudHistoryList" class="history"></div></div>
        </div>
      </div>
      <div class="tiny" style="margin-top:12px">Desarrollado por Leonardo Ballestero - 2025.</div>
    </div>
  </section>

<script>
'use strict';
const firebaseConfig = { apiKey: "AIzaSyAg7CKq8cMD7WZXJSKylls5JJS4juvxi54", authDomain: "sorteador-53cb5.firebaseapp.com", projectId: "sorteador-53cb5", storageBucket: "sorteador-53cb5.firebasestorage.app", messagingSenderId: "583913752340", appId: "1:583913752340:web:347f8b2866fcbb216e6401" };
firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();

function toast(msg) { const el = document.createElement('div'); el.textContent = msg; el.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#111827;border:1px solid #334155;padding:10px 12px;border-radius:10px;z-index:9999;'; document.body.appendChild(el); setTimeout(() => el.remove(), 1500); }
function escapeHtml(text) { const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return text.replace(/[&<>"']/g, m => map[m]); }
function downloadText(text, filename) { const blob = new Blob([text], {type: 'text/csv;charset=utf-8;'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url); }
function safeFilePart(value) { if (!value) return ''; let s = String(value); try { s = s.normalize('NFD').replace(/[\u0300-\u036f]/g, ''); } catch (e) {} return s.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9._-]/g, '').replace(/_+/g, '_').replace(/^_+|_+$/g, ''); }
function getSystemParamCurrent() { const fmt = getFormat(); if (fmt === 'simple') return 'orden_paso'; if (fmt === 'custom') { const z = currentZones(); const tpz = parseInt(document.getElementById('teamsPerZone')?.value || '', 10); return tpz ? `custom_${z}x${tpz}` : `custom_${z}`; } return fmt || 'sorteo'; }
function buildExportFilename(ext, meta) { const date = meta?.date || new Date().toISOString().slice(0,10); const parts = [safeFilePart(meta?.discipline || ''), safeFilePart(meta?.category || ''), safeFilePart(meta?.gender || ''), safeFilePart(meta?.modality || ''), safeFilePart(meta?.system || ''), safeFilePart(date)].filter(Boolean); return `${parts.length ? parts.join('_') : `sorteo_${safeFilePart(date)}`}.${ext}`; }
function getCurrentMetaForFilename() { return { discipline: (document.getElementById('disciplineSelect')?.selectedOptions?.[0]?.text) || '', category: (document.getElementById('categorySelect')?.value) || '', gender: (document.getElementById('genderSelect')?.value) || '', modality: (document.getElementById('modalitySelect')?.value) || '', system: getSystemParamCurrent(), date: new Date().toISOString().slice(0,10) }; }
function getCloudMetaForFilename(d) { return { discipline: d?.discipline || '', category: d?.category || '', gender: d?.gender || '', modality: d?.modality || '', system: (d?.type === 'simple') ? 'orden_paso' : (d?.format || 'zonas'), date: (d?.createdAt?.toDate) ? d.createdAt.toDate().toISOString().slice(0,10) : new Date().toISOString().slice(0,10) }; }
function copyText(text) { navigator.clipboard.writeText(text).then(() => toast('Copiado')).catch(() => alert('No se pudo copiar')); }

function parseCSVLine(line, delimiter) { const result = []; let current = ''; let inQuotes = false; for (let i = 0; i < line.length; i++) { const ch = line[i], next = line[i + 1]; if (ch === '"') { if (inQuotes && next === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; } } else if (ch === delimiter && !inQuotes) { result.push(current.trim()); current = ''; } else { current += ch; } } result.push(current.trim()); return result; }
function parseCSV(text) { if (!text.trim()) return {headers: [], rows: [], delimiter: ','}; const firstLine = text.split(/\r?\n/)[0] || ''; const counts = {',': (firstLine.match(/,/g) || []).length, ';': (firstLine.match(/;/g) || []).length, '\t': (firstLine.match(/\t/g) || []).length}; const best = Object.keys(counts).sort((a, b) => counts[b] - counts[a])[0] || ','; const lines = text.split(/\r?\n/).filter(l => l.trim()); const headers = parseCSVLine(lines[0], best); const rows = lines.slice(1).map(l => parseCSVLine(l, best)); return {headers, rows, delimiter: best}; }
function importTeamsCSV(text) { if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1); const {headers, rows, delimiter} = parseCSV(text); let nameIdx = -1, provinceIdx = -1, headIdx = -1; if (headers.length) { headers.forEach((h, i) => { const s = h.toLowerCase(); if (nameIdx === -1 && (s.includes('equipo') || s.includes('team') || s.includes('nombre') || s.includes('club'))) nameIdx = i; if (provinceIdx === -1 && (s.includes('provincia') || s.includes('province') || s.includes('región') || s.includes('region') || s.includes('localidad'))) provinceIdx = i; if (headIdx === -1 && (s.includes('cabeza') || s.includes('head') || s.includes('seed') || s.includes('semilla'))) headIdx = i; }); } if (nameIdx === -1) { nameIdx = 0; provinceIdx = headers.length > 1 ? 1 : -1; headIdx = headers.length > 2 ? 2 : -1; } const teams = []; const uniq = new Set(); for (const row of rows) { if (row.length <= nameIdx) continue; const raw = (row[nameIdx] || ''); const name = raw.replace(/\*+$/, '').trim(); if (!name) continue; const key = name.toLowerCase(); if (uniq.has(key)) continue; uniq.add(key); const province = (provinceIdx !== -1 && row[provinceIdx]) ? row[provinceIdx].replace(/\*+$/, '').trim() : ''; const hv = (headIdx !== -1 && row[headIdx]) ? String(row[headIdx]).toLowerCase().trim() : ''; const head = /^(si|sí|true|1|\*|x|head|seed|cs)$/i.test(hv) || /\*$/.test(raw); teams.push({name, province, head}); } return {teams, delimiter, hasHeaders: headers.length > 0}; }
function importDisciplinesCSV(text) { if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1); const {headers, rows, delimiter} = parseCSV(text); let nameIdx = 0, seedIdx = 1; if (headers.length) { headers.forEach((h, i) => { const s = h.toLowerCase(); if (s.includes('disciplina') || s.includes('deporte') || s.includes('nombre')) nameIdx = i; if (s.includes('semilla') || s.includes('seed') || s.includes('código') || s.includes('codigo')) seedIdx = i; }); } const items = []; for (const row of rows) { const name = (row[nameIdx] || '').trim(); if (!name) continue; const seed = (row[seedIdx] || name).trim(); items.push({name, seed}); } return {items, delimiter, hasHeaders: headers.length > 0}; }
function importCategoriesCSV(text) { if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1); const {headers, rows, delimiter} = parseCSV(text); let nameIdx = 0, seedIdx = 1; if (headers.length) { headers.forEach((h, i) => { const s = h.toLowerCase(); if (s.includes('categor') || s.includes('división') || s.includes('division') || s.includes('nombre')) nameIdx = i; if (s.includes('semilla') || s.includes('seed') || s.includes('código') || s.includes('codigo')) seedIdx = i; }); } const items = []; for (const row of rows) { const name = (row[nameIdx] || '').trim(); if (!name) continue; const seed = (row[seedIdx] || name).trim(); items.push({name, seed}); } return {items, delimiter, hasHeaders: headers.length > 0}; }
function importModalitiesCSV(text) { if (text && text.charCodeAt(0) === 0xFEFF) text = text.slice(1); const {headers, rows, delimiter} = parseCSV(text); let nameIdx = 0; if (headers.length) { headers.forEach((h, i) => { const s = h.toLowerCase(); if (s.includes('modalidad') || s.includes('tipo') || s.includes('nombre')) nameIdx = i; }); } const items = []; for (const row of rows) { const name = (row[nameIdx] || '').trim(); if (!name) continue; items.push({name, seed: name}); } return {items, delimiter, hasHeaders: headers.length > 0}; }

function refreshDisciplineSelects() { const sel = document.getElementById('disciplineSelect'); if(!sel)return; const current = sel.value; sel.innerHTML = '<option value="">— Seleccionar disciplina —</option>'; disciplines.forEach(d => { const o = document.createElement('option'); o.value = d.seed; o.textContent = d.name; sel.appendChild(o); }); if (current && [...sel.options].some(o => o.value === current)) sel.value = current; }

function buildListsFromTextarea() { const lines = document.getElementById('teamsInput').value.split(/\r?\n/).filter(l => l.trim()); activeTeams = []; inactiveTeams = []; const uniq = new Set(); for (const line of lines) { const parts = line.split(line.includes(';') ? ';' : ',').map(p => p.trim()); const name = (parts[0] || '').replace(/\s*\*+\s*$/, '').trim(); if (!name || uniq.has(name.toLowerCase())) continue; uniq.add(name.toLowerCase()); const p = (parts[1] || '').replace(/\s*\*+\s*$/, '').trim(); const raw3 = String(parts[2] || '').trim().toLowerCase(); activeTeams.push({ name, province: p, head: /^(si|sí|true|1|\*|x|cs|head|seed)$/i.test(raw3) || /\*\s*$/.test(line.trim()) }); } document.getElementById('checkLists').classList.remove('hidden'); renderLists(); updateCapInfo(); toast('Lista procesada'); }

function getActiveTeamsLive() { const lines = document.getElementById('teamsInput').value.split(/\r?\n/).filter(l => l.trim()); const uniq = new Set(), textTeams = [], mapByName = new Map(); for (const line of lines) { const parts = line.split(line.includes(';') ? ';' : ',').map(p => p.trim()); const name = (parts[0] || '').replace(/\s*\*+\s*$/, '').trim(); if (!name || uniq.has(name.toLowerCase())) continue; uniq.add(name.toLowerCase()); const t = { name, province: (parts[1] || '').replace(/\s*\*+\s*$/, '').trim(), head: /^(si|sí|true|1|\*|x|cs|head|seed)$/i.test(String(parts[2] || '').trim().toLowerCase()) || /\*\s*$/.test(line.trim()) }; textTeams.push(t); mapByName.set(name.toLowerCase(), t); } if (document.getElementById('checkLists').classList.contains('hidden')) return textTeams; return activeTeams.map(t => { const f = mapByName.get(t.name.toLowerCase()); return f ? { ...t, head: f.head } : t; }); }

function xmur3(str) { let h = 1779033703 ^ str.length; for (let i = 0; i < str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h << 13 | h >>> 19; } return function() { h = Math.imul(h ^ h >>> 16, 2246822507); h = Math.imul(h ^ h >>> 13, 3266489909); return (h ^ h >>> 16) >>> 0; }; }
function mulberry32(a) { return function() { let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function rngFromSeed(seed) { if (!seed || seed.trim() === "") return Math.random; return mulberry32(xmur3(String(seed))()); }
function shuffle(array, rand) { const a = [...array]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rand() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function capacities(n, z) { const base = Math.floor(n / z), rest = n % z; return Array.from({length: z}, (_, i) => base + (i < rest ? 1 : 0)); }
function capacitiesWithTeamsPerZone(n, z, tpz) { if (n > z * tpz) return capacities(n, z); let caps = Array(z).fill(tpz), cur = z - 1; for (let i = 0; i < z * tpz - n; i++) { if (caps[cur] <= 3) return capacitiesWithTeamsPerZone(n, Math.max(1, Math.ceil(n / tpz)), tpz); caps[cur]--; cur = cur < 1 ? z - 1 : cur - 1; } return caps; }
function drawGroups(teams, z, headsAsFirst, seed, format) { const rand = rngFromSeed(seed), n = teams.length; if (z < 1) return {error: 'Zonas ≥ 1'}; if (n < z) return {error: 'Menos equipos que zonas'}; let capsBase; if (format === 'custom') capsBase = capacitiesWithTeamsPerZone(n, z, parseInt(document.getElementById('teamsPerZone').value) || 4); else if (format === '4x6' && z === 4 && n <= 24) capsBase = [6,6,6,6]; else if (format === '8x3' && z === 8 && n <= 24) capsBase = [3,3,3,3,3,3,3,3]; else capsBase = capacities(n, z); const groups = Array.from({length: capsBase.length}, () => []), heads = shuffle(teams.filter(t => t.head), rand), others = shuffle(teams.filter(t => !t.head), rand); if (headsAsFirst && heads.length) for (let i = 0; i < groups.length && i < heads.length; i++) groups[i].push(heads[i]); const targetCaps = capsBase.map((c, i) => Math.max(0, c - groups[i].length)), pool = headsAsFirst ? others : shuffle(teams, rand); for (let attempt = 0; attempt < 500; attempt++) { const g = groups.map(a => [...a]), rem = [...targetCaps]; let ok = true; for (const team of shuffle(pool, rand)) { const opts = g.map((a, i) => ({i, s: a.length, c: rem[i]})).filter(x => x.c > 0).sort((a,b) => a.s - b.s || a.i - b.i).map(x => x.i); if (!opts.length) { ok = false; break; } const p = opts[Math.floor(rand() * opts.length)]; g[p].push(team); rem[p]--; } if (ok) return {groups: g, caps: capsBase, relaxed: false, attempt}; } return {error: 'No se pudo asignar'}; }

nd:#f8fafc;border:1px solid #cbd5e1;padding:6px 12px;border-radius:20px;font-weight:bold}.grid{display:flex;flex-wrap:wrap;gap:16px}.zone{flex:1 1 calc(50% - 16px);background:#fff;border:2px solid #e2e8f0;border-radius:8px;padding:15px;box-sizing:border-box}.zone h4{margin:0 0 10px 0;border-bottom:2px solid #94E5F2;padding-bottom:5px}.zone ol{margin:0;padding-left:20px}.zone li{padding:3px 0}.btn{background:#22c55e;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:bold;cursor:pointer;margin:20px auto 0;display:block}@media print{body{background:#fff;padding:0}.container{box-shadow:none;padding:0;max-width:100%}.btn{display:none!important}.zone{border:2px solid #1e293b;page-break-inside:avoid;break-inside:avoid}.grid{display:block}.zone{display:inline-block;width:48%;margin-right:1%;vertical-align:top;margin-bottom:15px}@page{margin:1.5cm}}</style></head><body><div class="container"><h1>🎲 Sorteo (Nube)</h1><div class="chips">${chips}</div><div class="grid">${zones}</div><button class="btn" onclick="const o=document.title;document.title=${JSON.stringify(buildExportFilename('pdf', getCloudMetaForFilename(d)).replace('.pdf',''))};window.print();setTimeout(()=>document.title=o,1000)">🖨️ Imprimir PDF</button></div></body></html>`); w.document.close(); } }; div.querySelector('.btnCsv').onclick = () => { const m = getCloudMetaForFilename(d); if(d.type==='simple'){ let c = 'Posicion,Equipo\n'; (d.list||[]).forEach((n,i) => c+=`${i+1},"${String(n).replace(/"/g,'""')}"\n`); downloadText(c, buildExportFilename('csv', m)); }else{ let c = ''; (d.groups||[]).forEach((g,gi)=>{ const z = String.fromCharCode(65+gi); (g.teams||[]).forEach(t=>{ const r=String(t?.name||''); c+=`${z};${/[;"\r\n]/.test(r)?`"${r.replace(/"/g,'""')}"`:r}\n`; }); }); downloadText(c, buildExportFilename('csv', m)); } }; div.querySelector('.btnShare').onclick = () => { const s = { type:d.type||'zones', teamsCount:d.teamsCount, discipline:d.discipline||'', category:d.category||'', gender:d.gender||'', modality:d.modality||'', timestamp:d.createdAt?.toDate().toISOString()||new Date().toISOString() }; if(d.type==='simple') s.list = d.list; else { s.groups = d.groups; s.zones = d.zones; s.format = d.format; } copyText(`${window.location.origin}${window.location.pathname}?shared=${encodeURIComponent(JSON.stringify(s))}`); toast('Copiado!'); }; div.querySelector('.btnDel').onclick = () => { if(confirm('¿Eliminar?')) db.collection('users').doc(auth.currentUser.uid).collection('draws').doc(doc.id).delete(); }; listEl.appendChild(div); }); }); }

function getFormat() { const r = document.querySelector('input[name="format"]:checked'); return r ? r.value : 'custom'; }
function currentZones() { const f = getFormat(); return f==='8x3'?8:f==='4x6'?4:parseInt(document.getElementById('zones').value)||1; }
function updateCapInfo() { const t = getActiveTeamsLive().length, f = getFormat(); if(f==='simple') document.getElementById('capInfo').innerHTML = `Eq: ${t} · Simple`; else { const z = currentZones(); document.getElementById('capInfo').innerHTML = f==='custom' ? `Eq: ${t} · Zonas: ${capacitiesWithTeamsPerZone(t,z,parseInt(document.getElementById('teamsPerZone').value)||4).length}` : `Eq: ${t} · Zonas: ${z}`; } }

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tabcontent').forEach(c => c.classList.add('hidden')); b.classList.add('active'); }));
  (async function() { try { const d = await fetch('Disciplinas.csv').then(r=>r.text()); const rp = importDisciplinesCSV(d); if(rp.items.length) { disciplines = rp.items; refreshDisciplineSelects(); } } catch(e){} })();
  (async function() { try { const d = await fetch('Categorias.csv').then(r=>r.text()); const rp = importCategoriesCSV(d); if(rp.items.length) { categories = rp.items; refreshCategorySelects(); } } catch(e){} })();
  (async function() { try { const d = await fetch('modalidad.csv').then(r=>r.text()); const rp = importModalitiesCSV(d); if(rp.items.length) { modalities = rp.items; refreshModalitySelects(); } } catch(e){} })();

  document.querySelectorAll('input[name="format"]').forEach(r => r.addEventListener('change', () => { const z = document.getElementById('zones'), c = document.getElementById('customZonesContainer'), c2 = document.getElementById('customTeamsPerZoneContainer'); if(r.value==='8x3'){ z.value='8'; z.disabled=true; c.classList.add('hidden'); c2.classList.add('hidden'); }else if(r.value==='4x6'){ z.value='4'; z.disabled=true; c.classList.add('hidden'); c2.classList.add('hidden'); }else if(r.value==='simple'){ z.disabled=true; c.classList.add('hidden'); c2.classList.add('hidden'); }else{ z.disabled=false; c.classList.remove('hidden'); c2.classList.remove('hidden'); } updateCapInfo(); }));
  document.getElementById('btnBuildList').addEventListener('click', buildListsFromTextarea);
  document.getElementById('toggleShowInactive').addEventListener('change', renderLists);
  document.getElementById('btnMoveToInactive').addEventListener('click', moveSelectedToInactive);
  document.getElementById('btnRestoreSelected').addEventListener('click', restoreSelectedFromInactive);
  document.getElementById('selectAllActive').addEventListener('change', function() { document.querySelectorAll('.chkActive').forEach(c => c.checked = this.checked); });
  document.getElementById('selectAllInactive').addEventListener('change', function() { document.querySelectorAll('.chkInactive').forEach(c => c.checked = this.checked); });
  document.addEventListener('change', e => { if(e.target.classList.contains('chkActive')) document.getElementById('selectAllActive').checked = document.querySelectorAll('.chkActive:checked').length === document.querySelectorAll('.chkActive').length; if(e.target.classList.contains('chkInactive')) document.getElementById('selectAllInactive').checked = document.querySelectorAll('.chkInactive:checked').length === document.querySelectorAll('.chkInactive').length; });
  document.getElementById('btnExample').addEventListener('click', () => { document.getElementById('teamsInput').value = "River Plate, CABA\nBoca Juniors, CABA, *\nNewell's, Santa Fe"; updateCapInfo(); });
  document.getElementById('btnClear').addEventListener('click', () => { document.getElementById('teamsInput').value=''; activeTeams=[]; inactiveTeams=[]; document.getElementById('checkLists').classList.add('hidden'); document.getElementById('resultGroups').innerHTML=''; document.getElementById('status').innerHTML=''; updateCapInfo(); lastResult=null; ['btnExportCSV','btnCopy','btnShare'].forEach(id => document.getElementById(id).classList.add('hidden')); });

  document.getElementById('btnDrawGroups').addEventListener('click', async () => {
    const teams = getActiveTeamsLive(); if (!teams.length) return document.getElementById('status').innerHTML='Error';
    const fmt = getFormat(), base = document.getElementById('disciplineSelect').value||'sorteo', seed = `${base}-${Date.now()}`;
    if (fmt === 'simple') {
      const list = shuffle(teams.map(t=>t.name), rngFromSeed(seed));
      document.getElementById('resultGroups').innerHTML = list.map((n,i)=>`<div style="margin-bottom:8px">${i+1}. <b>${escapeHtml(n)}</b></div>`).join('');
      ['btnExportCSV','btnCopy'].forEach(id => document.getElementById(id).classList.remove('hidden'));
      openSimpleResultInNewTab(list);
      saveSimpleDrawToCloud(list, { discipline: document.getElementById('disciplineSelect').selectedOptions[0]?.text||'', disciplineSeed: base, category: document.getElementById('categorySelect').value||'', gender: document.getElementById('genderSelect').value||'', modality: document.getElementById('modalitySelect').value||'' });
    } else {
      const z = currentZones(), res = drawGroups(teams, z, document.getElementById('headsAsFirst').checked, seed, fmt);
      renderGroups(document.getElementById('resultGroups'), res);
      ['btnExportCSV','btnCopy','btnShare'].forEach(id => document.getElementById(id).classList.remove('hidden'));
      if (!res.error) { openResultInNewTab(res); saveDrawToCloud(res, { teamsCount: teams.length, zones: z, format: fmt, discipline: document.getElementById('disciplineSelect').selectedOptions[0]?.text||'', disciplineSeed: base, category: document.getElementById('categorySelect').value||'', gender: document.getElementById('genderSelect').value||'', modality: document.getElementById('modalitySelect').value||'' }); }
    }
  });

  const hdlCsv = (id, fn) => document.getElementById(id).addEventListener('change', e => { const f = e.target.files[0]; if(!f)return; const r = new FileReader(); r.onload = () => { try { fn(new TextDecoder('utf-8').decode(r.result)); } catch(ex){} }; r.readAsArrayBuffer(f); });
  hdlCsv('csvFile', txt => { const {teams} = importTeamsCSV(txt); document.getElementById('teamsInput').value = teams.map(t=>`${t.name}${t.province?'; '+t.province:''}${t.head?'; *':''}`).join('\n'); buildListsFromTextarea(); });
  hdlCsv('csvDisciplines', txt => { disciplines = importDisciplinesCSV(txt).items; refreshDisciplineSelects(); });
  hdlCsv('csvCategories', txt => { categories = importCategoriesCSV(txt).items; refreshCategorySelects(); });
  hdlCsv('csvModalities', txt => { modalities = importModalitiesCSV(txt).items; refreshModalitySelects(); });

  document.getElementById('btnExportCSV').addEventListener('click', () => { if(getFormat()==='simple'){ downloadText('Posicion,Equipo\n'+getActiveTeamsLive().map((t,i)=>`${i+1},"${t.name.replace(/"/g,'""')}"\n`).join(''), buildExportFilename('csv', getCurrentMetaForFilename())); } else { if(!lastResult)return; downloadText(lastResult.groups.map((g,gi)=>g.map(t=>`${String.fromCharCode(65+gi)};${/[;"\r\n]/.test(t.name)?`"${t.name.replace(/"/g,'""')}"`:t.name}\n`).join('')).join(''), buildExportFilename('csv', getCurrentMetaForFilename())); } });
  document.getElementById('btnCopy').addEventListener('click', () => { if(getFormat()==='simple') copyText(getActiveTeamsLive().map((t,i)=>`${i+1}. ${t.name}`).join('\n')); else if(lastResult) copyText(lastResult.groups.map((g,gi)=>`Zona ${gi+1}\n`+g.map((t,i)=>`${i+1}. ${t.name}${t.head?' (Cabeza)':''}`).join('\n')).join('\n\n')); });
  
  document.addEventListener('change', e => { if(e.target.id === 'selectAllCloudBtn') document.querySelectorAll('.cloud-draw-checkbox').forEach(c => c.checked = e.target.checked); if(e.target.classList.contains('cloud-draw-checkbox')) document.getElementById('selectAllCloudBtn').checked = document.querySelectorAll('.cloud-draw-checkbox:checked').length === document.querySelectorAll('.cloud-draw-checkbox').length; });
  document.getElementById('deleteSelectedCloud').addEventListener('click', () => { const cs = document.querySelectorAll('.cloud-draw-checkbox:checked'); if(!cs.length || !confirm('¿Eliminar?')) return; cs.forEach(c => db.collection('users').doc(auth.currentUser.uid).collection('draws').doc(c.dataset.id).delete()); });
});

document.querySelectorAll('.authTab').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.authTab').forEach(x => x.classList.remove('active')); document.querySelectorAll('.authForm').forEach(x => x.classList.add('hidden')); t.classList.add('active'); document.getElementById(t.dataset.tab+'Form').classList.remove('hidden'); }));
document.getElementById('registerForm').addEventListener('submit', async e => { e.preventDefault(); if(document.getElementById('registerPassword').value !== document.getElementById('registerConfirmPassword').value) return toast('Claves distintas'); try { const c = await auth.createUserWithEmailAndPassword(document.getElementById('registerEmail').value, document.getElementById('registerPassword').value); await c.user.updateProfile({displayName: document.getElementById('registerName').value}); toast('Cuenta creada'); } catch(e){ toast('Error'); } });
document.getElementById('loginForm').addEventListener('submit', async e => { e.preventDefault(); try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); toast('Sesión iniciada'); } catch(e){ toast('Error'); } });
document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

auth.onAuthStateChanged(u => { const sAuth = document.getElementById('authSection'), sApp = document.getElementById('appSection'); if(u){ sAuth.classList.add('hidden'); sApp.classList.remove('hidden'); document.getElementById('userInfo').textContent = u.displayName || u.email; subscribeCloudHistory(); } else { sApp.classList.add('hidden'); sAuth.classList.remove('hidden'); if(cloudUnsub) cloudUnsub(); } });

const themeToggle = document.getElementById('themeToggle');
document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
function updateThemeBtn() { themeToggle.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '🌙 Tema Oscuro' : '☀️ Tema Claro'; document.querySelectorAll('.logo').forEach(l => l.src = document.documentElement.getAttribute('data-theme') === 'light' ? 'logo-light.png' : 'logo-dark.png'); }
updateThemeBtn();
themeToggle.addEventListener('click', () => { const n = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', n); localStorage.setItem('theme', n); updateThemeBtn(); });

if(new URLSearchParams(window.location.search).get('shared')) { try { const d = JSON.parse(decodeURIComponent(new URLSearchParams(window.location.search).get('shared'))); window.history.replaceState({},'',window.location.pathname); if(confirm('¿Ver sorteo compartido?')) { const w = window.open('','_blank'); if(!w) toast('Pop-up bloqueado'); else { const html = d.type === 'simple' ? `<h2>Compartido</h2><ol>${d.list.map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ol>` : `<h2>Compartido</h2>${d.groups.map(g=>`<h4>Zona ${g.groupNumber}</h4><ul>${g.teams.map(t=>`<li>${escapeHtml(t.name)}</li>`).join('')}</ul>`).join('')}`; w.document.write(html); } } } catch(e){} }
</script>
</body>
</html>
